services:
  photoframe:
    build: .
    container_name: photoframe-server
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - /path/to/your/photos:/media:ro
    environment:
      - REFRESH=30        # seconds between photos on the HTML page
      - TITLE=            # optional overlay text
      - FRIGATE_URL=      # optional: Frigate base URL for detection proxy (e.g. http://192.168.1.207:5000)
      - HA_URL=           # optional: Home Assistant URL (e.g. http://192.168.1.245:8123)
      - HA_TOKEN=         # optional: HA long-lived access token for /ha/* endpoints
    # For Crestron EMS mode, point the panel at:
    #   http://<host-ip>:8099/
    #
    # For panel-lite screensaver, use the /random endpoint:
    #   http://<host-ip>:8099/random
    #   http://<host-ip>:8099/random?w=1280&h=800  (resized on the fly)
