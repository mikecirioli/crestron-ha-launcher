<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crestron Panel Lite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111318;
    color: #e1e1e1;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* ══════════════════════════════════════════════════════════
     DASHBOARD VIEW
     ══════════════════════════════════════════════════════════ */
  #dashboard {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }
  #dashboard.hidden { display: none; }

  /* ── Row 1: Chips bar ──────────────────────────────────── */
  .chips-bar {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    height: 54px;
    -webkit-flex: 0 0 54px;
    flex: 0 0 54px;
    background: rgba(0,0,0,0.3);
  }

  /* ── Row 2: Main content (camera + info) ─────────────── */
  .main-row {
    display: -webkit-flex;
    display: flex;
    -webkit-flex: 1 1 auto;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    height: 36px;
  }
  .chip-icon {
    font-size: 18px;
    opacity: 0.8;
    width: 20px;
    text-align: center;
  }
  .chip.on {
    background: rgba(255,193,7,0.2);
    color: #ffc107;
  }
  .chip-spacer { flex: 1; }

  /* ── Row 2, Col 1: Camera ──────────────────────────────── */
  .camera-area {
    -webkit-flex: 2 1 0%;
    flex: 2 1 0%;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  .cam-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    -webkit-transition: opacity 0.3s;
    transition: opacity 0.3s;
  }
  .camera-label {
    position: absolute;
    top: 10px;
    left: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
  }

  /* ── Row 2, Col 2: Info column ─────────────────────────── */
  .info-area {
    -webkit-flex: 1 1 0%;
    flex: 1 1 0%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    overflow: hidden;
  }

  /* Weather section */
  .weather-section {
    flex: 0 0 170px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .weather-current {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .weather-temp {
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
  }
  .weather-detail {
    font-size: 14px;
    opacity: 0.8;
    line-height: 1.4;
  }
  .weather-forecast {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 8px;
  }
  .wf-day {
    text-align: center;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.4;
    flex: 1;
  }
  .wf-day .wf-name { font-weight: 600; font-size: 13px; }
  .wf-day .wf-hi { font-weight: 500; }
  .wf-day .wf-lo { opacity: 0.5; }
  .wf-day .wf-cond { font-size: 11px; opacity: 0.6; }

  /* Calendar section */
  .calendar-section {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .calendar-section::-webkit-scrollbar { width: 4px; }
  .calendar-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .cal-day-header {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    margin: 10px 0 3px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cal-day-header:first-child { margin-top: 6px; }
  .cal-event {
    padding: 4px 10px;
    border-left: 4px solid;
    margin: 0 6px 3px 6px;
    border-radius: 0 4px 4px 0;
    background: rgba(255,255,255,0.07);
  }
  .cal-ev-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }
  .cal-ev-time {
    font-size: 11px;
    color: #aaa;
  }
  .cal-empty {
    color: #666;
    text-align: center;
    padding: 20px 10px;
    font-size: 14px;
  }

  /* ── Row 3: Detection strip ────────────────────────────── */
  .detection-strip {
    display: -webkit-flex;
    display: flex;
    gap: 3px;
    height: 120px;
    -webkit-flex: 0 0 120px;
    flex: 0 0 120px;
    overflow: hidden;
    background: #111318;
  }
  .det {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-flex: 1 1 0%;
    flex: 1 1 0%;
    overflow: hidden;
    background: #1a1a1a;
    border-radius: 3px;
    height: 120px;
  }
  .det-img {
    flex: 1 1 auto;
    overflow: hidden;
    min-height: 0;
  }
  .det-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .det-info {
    flex: 0 0 16px;
    padding: 1px 4px 2px;
    font-size: 9px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: rgba(0,0,0,0.4);
  }
  .det-name { opacity: 0.85; }
  .det-time { opacity: 0.45; }

  /* ══════════════════════════════════════════════════════════
     SCREENSAVER VIEW
     ══════════════════════════════════════════════════════════ */
  #screensaver {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 100;
  }
  #screensaver.hidden { display: none; }

  .ss-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .ss-layer.visible { opacity: 1; }

  .ss-overlay {
    position: fixed;
    background: rgba(0, 0, 0, 0.35);
    color: #fff;
    padding: 16px 24px;
    border-radius: 14px;
    z-index: 110;
    text-align: right;
  }
  .ss-overlay .ss-clock {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .ss-overlay .ss-date {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 2px;
  }
  .ss-overlay .ss-weather {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.9;
    margin-top: 6px;
  }
  .ss-overlay .ss-nextevent {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 6px;
  }
  .ss-overlay .ss-forecast {
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 8px;
    display: flex;
    gap: 16px;
    justify-content: flex-end;
  }
  .ss-overlay .ss-fc-day {
    text-align: center;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.4;
  }
  .ss-fc-day .ss-fc-name { font-weight: 600; font-size: 13px; }
  .ss-fc-day .ss-fc-hi { font-weight: 500; }
  .ss-fc-day .ss-fc-lo { opacity: 0.6; }
  .ss-fc-day .ss-fc-cond { font-size: 11px; opacity: 0.7; }
  .ss-debug {
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 4px;
    font-size: 10px;
    font-family: monospace;
    opacity: 0.45;
    line-height: 1.3;
  }
</style>
</head>
<body>

  <!-- ════ DEBUG STATUS (visible until dashboard renders) ══ -->
  <div id="dbg" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font:12px monospace;padding:8px;white-space:pre-wrap;max-height:50%;overflow-y:auto;display:none"></div>

  <!-- ════ DASHBOARD ═══════════════════════════════════════ -->
  <div id="dashboard">
    <div class="chips-bar" id="chips-bar"></div>
    <div class="main-row">
      <div class="camera-area">
        <img id="cam-img-a" class="cam-layer" alt="">
        <img id="cam-img-b" class="cam-layer" style="opacity:0" alt="">
        <div class="camera-label" id="cam-label"></div>
      </div>
      <div class="info-area">
        <div class="weather-section" id="weather-section"></div>
        <div class="calendar-section" id="calendar-section"></div>
      </div>
    </div>
    <div class="detection-strip" id="detection-strip"></div>
  </div>

  <!-- ════ SCREENSAVER ═════════════════════════════════════ -->
  <div id="screensaver" class="hidden">
    <img id="ss-photo-a" class="ss-layer" alt="">
    <img id="ss-photo-b" class="ss-layer" alt="">
    <div class="ss-overlay" id="ss-overlay">
      <div class="ss-clock" id="ss-clock"></div>
      <div class="ss-date" id="ss-date"></div>
      <div class="ss-weather" id="ss-weather"></div>
      <div class="ss-nextevent" id="ss-nextevent"></div>
      <div class="ss-forecast" id="ss-forecast"></div>
      <div class="ss-debug" id="ss-debug"></div>
    </div>
  </div>

<script src="panel-lite-config.js"></script>
<script>
// Early diagnostic — runs even if main script has parse errors
// Visible with ?debug=1 or #debug (hash works around Crestron BROWSEROPEN mangling = and &)
if (location.search.indexOf('debug=1') !== -1 || location.hash.indexOf('debug') !== -1) {
  document.getElementById('dbg').style.display = '';
}
document.getElementById('dbg').textContent = 'EARLY: page loaded\nUA: ' + navigator.userAgent;
</script>
<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('dbg');
  if (d) { d.style.display = ''; d.textContent += '\nERROR: ' + msg + ' @ line ' + line + ':' + col; }
};
(function() {
  'use strict';

  // ══════════════════════════════════════════════════════════
  // CONFIGURATION — loaded from panel-lite-config.js
  // Edit that file for secrets, entities, and tuning.
  // ══════════════════════════════════════════════════════════

  var C = window.PANEL_CONFIG || {};

  var HA_URL            = C.HA_URL   || '';
  var HA_TOKEN          = C.HA_TOKEN || '';
  var PHOTOFRAME_URL    = C.PHOTOFRAME_URL || '';
  var CAMERAS           = C.CAMERAS  || [];
  var DETECTIONS        = C.DETECTIONS || [];
  var CALENDARS         = C.CALENDARS  || [];
  var CHIPS             = C.CHIPS      || [];
  var WEATHER_ENTITY    = C.WEATHER_ENTITY  || 'weather.forecast_home';
  var CAMERA_SELECTOR   = C.CAMERA_SELECTOR || 'input_select.camera_selector';
  var CAM_REFRESH_MS    = C.CAM_REFRESH_MS  || 3000;
  var CAM_SYNC_MS       = C.CAM_SYNC_MS     || 1500;
  var CALENDAR_MS       = C.CALENDAR_MS     || 300000;
  var WEATHER_MS        = C.WEATHER_MS      || 300000;
  var DETECT_SLOTS      = C.DETECT_SLOTS    || 7;
  var PHOTO_MS          = C.PHOTO_MS        || 30000;
  var IDLE_TIMEOUT      = C.IDLE_TIMEOUT    || 120000;
  var SS_DRIFT_MS       = C.SS_DRIFT_MS     || 120000;
  var FORECAST_DAYS     = C.FORECAST_DAYS   || 3;
  var WS_RECONNECT_MS   = C.WS_RECONNECT_MS || 5000;

  // 1x1 transparent GIF — forces Chromium 95 to actually free decoded bitmap
  // (img.src = '' does NOT release GPU memory in this WebView version)
  var BLANK = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';

  // URL params can override config — but Crestron BROWSEROPEN mangles = and &,
  // so these only work from a real browser, not from the console.
  function getParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }
  var urlToken = getParam('token');
  var urlHaUrl = getParam('ha_url');
  if (urlToken) HA_TOKEN = urlToken;
  if (urlHaUrl) HA_URL = urlHaUrl.replace(/\/+$/, '');
  var urlPhotos = getParam('photos');
  if (urlPhotos) PHOTOFRAME_URL = urlPhotos.replace(/\/+$/, '');

  // Debug mode: ?debug=1 (browser) or #debug (Crestron-safe)
  var DEBUG_MODE = getParam('debug') === '1' || location.hash.indexOf('debug') !== -1;

  // Opt-in periodic reload for memory management
  var reloadParam = getParam('reload');
  if (reloadParam) {
    var reloadMs = parseInt(reloadParam, 10) * 1000;
    if (reloadMs > 0) {
      setTimeout(function() { location.reload(); }, reloadMs);
    }
  }

  // ══════════════════════════════════════════════════════════
  // DEBUG STATUS OVERLAY
  // ══════════════════════════════════════════════════════════

  var dbgEl = document.getElementById('dbg');
  var dbgLines = [];
  function dbg(msg) {
    var ts = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    dbgLines.push('[' + ts + '] ' + msg);
    if (dbgLines.length > 30) dbgLines.shift();
    if (dbgEl && DEBUG_MODE) dbgEl.textContent = dbgLines.join('\n');
  }
  dbg('page loaded');
  dbg('UA: ' + navigator.userAgent);
  dbg('URL: ' + location.href);
  dbg('HA_URL: ' + (HA_URL || '(auto-detect pending)'));
  dbg('HA_TOKEN: ' + (HA_TOKEN ? HA_TOKEN.substring(0, 20) + '...' : 'MISSING'));
  dbg('CrComLib: ' + (typeof window.CrComLib));
  dbg('WebSocket: ' + (typeof WebSocket));
  dbg('fetch: ' + (typeof fetch));

  // ══════════════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════════════

  var states = {};   // entity_id → state object (our own cache)
  var curCam = -1;
  var idleTimer = null;
  var manualScreensaver = false;
  var isScreensaver = false;

  // Screensaver photo state
  var ssLoadTimer = null;
  var ssSlideTimer = null;

  // Timers (stored for cleanup)
  var camRefreshInterval = null;
  var camSyncInterval = null;

  // DOM refs
  var dashEl = document.getElementById('dashboard');
  var ssEl = document.getElementById('screensaver');
  var camImgA = document.getElementById('cam-img-a');
  var camImgB = document.getElementById('cam-img-b');
  var camFront = 'a';  // which layer is currently visible
  var camLabel = document.getElementById('cam-label');
  var ssPhotoA = document.getElementById('ss-photo-a');
  var ssPhotoB = document.getElementById('ss-photo-b');
  var ssFront = 'a';
  var ssOverlay = document.getElementById('ss-overlay');

  // ══════════════════════════════════════════════════════════
  // WEBSOCKET CONNECTION
  // ══════════════════════════════════════════════════════════

  var ws = null;
  var wsId = 1;        // incrementing message ID
  var wsPending = {};  // id → {callback, subscription} map
  var wsReady = false;
  var wsReconnectTimer = null;

  function wsConnect() {
    wsReady = false;
    wsId = 1;
    wsPending = {};

    var wsUrl = HA_URL.replace(/^http/, 'ws') + '/api/websocket';
    dbg('ws connecting: ' + wsUrl);
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      dbg('ws constructor error: ' + e.message);
      return;
    }
    dbg('ws object created, readyState=' + ws.readyState);

    ws.onopen = function() {
      dbg('ws onopen, readyState=' + ws.readyState);
    };

    ws.onmessage = function(evt) {
      var msg;
      try { msg = JSON.parse(evt.data); } catch (e) { return; }

      if (msg.type === 'auth_required') {
        dbg('ws auth_required, sending token...');
        ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));
        return;
      }

      if (msg.type === 'auth_ok') {
        dbg('ws auth_ok! bootstrapping...');
        wsReady = true;
        wsBootstrap();
        return;
      }

      if (msg.type === 'auth_invalid') {
        dbg('ws AUTH FAILED: ' + msg.message);
        ws.close();
        return;
      }

      // Route responses and subscription events by id
      if (msg.id && wsPending[msg.id]) {
        var handler = wsPending[msg.id];
        if (msg.type === 'result') {
          if (handler.callback) handler.callback(msg.success ? msg.result : null);
          if (!handler.subscription) delete wsPending[msg.id];
        } else if (msg.type === 'event') {
          if (handler.callback) handler.callback(msg.event);
        }
      }
    };

    ws.onclose = function(evt) {
      dbg('ws closed: code=' + evt.code + ' reason=' + (evt.reason || 'none'));
      wsReady = false;
      ws = null;
      clearTimeout(wsReconnectTimer);
      wsReconnectTimer = setTimeout(wsConnect, WS_RECONNECT_MS);
    };

    ws.onerror = function(evt) {
      dbg('ws error event');
    };
  }

  function wsSend(msg, callback, subscription) {
    if (!ws || !wsReady) return 0;
    var id = wsId++;
    msg.id = id;
    if (callback) wsPending[id] = { callback: callback, subscription: !!subscription };
    ws.send(JSON.stringify(msg));
    return id;
  }

  function wsCallService(domain, service, data, target) {
    var msg = { type: 'call_service', domain: domain, service: service };
    if (data) msg.service_data = data;
    if (target) msg.target = target;
    wsSend(msg);
  }

  function wsBootstrap() {
    // 1. Fetch all states
    dbg('get_states...');
    wsSend({ type: 'get_states' }, function(result) {
      if (!result) { dbg('get_states FAILED'); return; }
      states = {};
      for (var i = 0; i < result.length; i++) {
        states[result[i].entity_id] = result[i];
      }
      dbg('got ' + result.length + ' states');
      // 2. Subscribe to state changes (keeps cache fresh + drives detections)
      wsSend(
        { type: 'subscribe_events', event_type: 'state_changed' },
        function(evt) {
          if (!evt || !evt.data) return;
          var eid = evt.data.entity_id;
          if (evt.data.new_state) {
            states[eid] = evt.data.new_state;
          } else {
            delete states[eid]; // entity removed
          }
          // Drive detection strip for detection entities
          var detName = DETECT_ENTITIES[eid];
          if (detName && evt.data.new_state) {
            var ns = evt.data.new_state;
            if (ns.attributes && ns.attributes.entity_picture) {
              addDetection(eid, detName, ns.attributes.entity_picture, ns.last_changed);
            }
          }
        },
        true // subscription
      );

      // 3. Subscribe to weather forecast
      wsSend(
        { type: 'weather/subscribe_forecast', forecast_type: 'daily', entity_id: WEATHER_ENTITY },
        function(msg) {
          if (msg && msg.forecast) {
            forecastData = msg.forecast;
            renderWeather();
            renderSSWeather();
          }
        },
        true // subscription
      );

      // 4. Start the UI
      init();
    });
  }

  // ══════════════════════════════════════════════════════════
  // HA HELPERS
  // ══════════════════════════════════════════════════════════

  function signPath(path, cb) {
    if (!wsReady) return cb(null);
    wsSend(
      { type: 'auth/sign_path', path: path, expires: 300 },
      function(result) {
        if (!result || !result.path) return cb(null);
        // sign_path returns a relative path — make it absolute
        cb(HA_URL + result.path);
      }
    );
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatCondition(state) {
    return state.replace(/-/g, ' ').replace(/_/g, ' ')
      .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function shortDay(dateStr) {
    var d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString([], { weekday: 'short' });
  }

  function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var m = Math.floor((new Date() - d) / 60000);
    if (m < 1) return 'Just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }


  // ══════════════════════════════════════════════════════════
  // VIEW SWITCHING
  // ══════════════════════════════════════════════════════════

  function showDashboard() {
    isScreensaver = false;
    ssEl.classList.add('hidden');
    dashEl.classList.remove('hidden');
    stopScreensaver();
    startDashboardTimers();
    startIdleTimer();
  }

  function showScreensaver() {
    isScreensaver = true;
    dashEl.classList.add('hidden');
    ssEl.classList.remove('hidden');
    stopDashboardTimers();
    startScreensaver();
  }

  // ══════════════════════════════════════════════════════════
  // IDLE DETECTION
  // ══════════════════════════════════════════════════════════

  function startIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function() {
      showScreensaver();
    }, IDLE_TIMEOUT);
  }

  function onActivity() {
    if (manualScreensaver) return;
    if (isScreensaver) {
      showDashboard();
    }
    startIdleTimer();
  }

  // Touch/mouse only (not keydown, to avoid conflicts with side buttons)
  ['touchstart', 'mousedown', 'mousemove'].forEach(function(evt) {
    document.addEventListener(evt, onActivity, { capture: true, passive: true });
  });

  // ══════════════════════════════════════════════════════════
  // SIDE BUTTON HANDLER (TSW-1060)
  // ══════════════════════════════════════════════════════════

  // TSW-1060 hardware buttons set e.code but e.key is null
  var BUTTON_MAP = {
    'BrowserBack':     'standby',
    'Home':            'go-home',
    'AudioVolumeUp':   'cam-next',
    'AudioVolumeDown': 'cam-prev',
    'AudioVolumeMute': 'toggle-ss'
  };

  window.addEventListener('keydown', function(e) {
    dbg('KEY: code=' + e.code + ' key=' + e.key);
    var action = BUTTON_MAP[e.code] || BUTTON_MAP[e.key];
    if (!action) return;
    dbg('BUTTON: ' + action);
    e.preventDefault();
    e.stopPropagation();

    switch (action) {
      case 'go-home':
        manualScreensaver = false;
        showDashboard();
        break;
      case 'toggle-ss':
        if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
        } else {
          manualScreensaver = true;
          clearTimeout(idleTimer);
          showScreensaver();
        }
        break;
      case 'cam-next':
        if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
          setTimeout(function() { cycleCamera('next'); }, 300);
        } else {
          cycleCamera('next');
        }
        startIdleTimer();
        break;
      case 'cam-prev':
        if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
          setTimeout(function() { cycleCamera('previous'); }, 300);
        } else {
          cycleCamera('previous');
        }
        startIdleTimer();
        break;
      case 'standby':
        dbg('standby');
        wsCallService('shell_command', 'crestron_standby');
        break;
    }
  }, true);

  function cycleCamera(direction) {
    if (!wsReady) return;
    var svc = direction === 'next' ? 'select_next' : 'select_previous';
    wsCallService('input_select', svc, { cycle: true },
      { entity_id: CAMERA_SELECTOR });
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: CHIPS BAR
  // ══════════════════════════════════════════════════════════

  function renderChips() {
    var now = new Date();
    var timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    var dateStr = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

    var html = '';
    html += '<div class="chip"><span class="chip-icon">\u23F0</span>' + esc(timeStr) + '</div>';
    html += '<div class="chip"><span class="chip-icon">\uD83D\uDCC5</span>' + esc(dateStr) + '</div>';
    html += '<div class="chip-spacer"></div>';

    for (var i = 0; i < CHIPS.length; i++) {
      var c = CHIPS[i];
      var st = states[c.entity];
      var isOn = st && (st.state === 'on' || st.state === 'cleaning' ||
                        st.state === 'home');
      html += '<div class="chip' + (isOn ? ' on' : '') + '">';
      html += '<span class="chip-icon">' + c.icon + '</span>';
      html += esc(c.name);
      html += '</div>';
    }

    document.getElementById('chips-bar').innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: CAMERA
  // ══════════════════════════════════════════════════════════

  function syncCamera() {
    var s = states[CAMERA_SELECTOR];
    if (!s) return;
    for (var i = 0; i < CAMERAS.length; i++) {
      if (CAMERAS[i].entity === s.state) {
        if (i !== curCam) {
          curCam = i;
          refreshCamera();
        }
        return;
      }
    }
  }

  var camPending = false; // guard against overlapping fetches

  function refreshCamera() {
    if (curCam < 0 || curCam >= CAMERAS.length) return;
    if (camPending) return; // skip if previous fetch still in flight
    camPending = true;
    var cam = CAMERAS[curCam];
    camLabel.textContent = cam.name;
    dbg('cam: signing ' + cam.entity);
    signPath('/api/camera_proxy/' + cam.entity + '?t=' + Date.now(), function(url) {
      if (!url) { dbg('cam: signPath returned null'); camPending = false; return; }
      // Load into the hidden (back) layer, then swap
      var back = (camFront === 'a') ? camImgB : camImgA;
      var front = (camFront === 'a') ? camImgA : camImgB;
      back.onload = function() {
        // Show back layer, hide front
        back.style.opacity = '1';
        front.style.opacity = '0';
        camFront = (camFront === 'a') ? 'b' : 'a';
        camPending = false;
      };
      back.onerror = function() {
        dbg('cam: load FAILED');
        camPending = false;
      };
      back.src = url;
    });
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: WEATHER
  // ══════════════════════════════════════════════════════════

  var forecastData = null;
  var calendarEvents = [];

  function renderWeather() {
    var entity = states[WEATHER_ENTITY];
    if (!entity) return;

    var temp = Math.round(entity.attributes.temperature);
    var unit = entity.attributes.temperature_unit || '\u00B0F';
    var cond = formatCondition(entity.state);
    var humid = entity.attributes.humidity;

    var html = '';
    html += '<div class="weather-current">';
    html += '<div class="weather-temp">' + temp + '<span style="font-size:20px">' + esc(unit) + '</span></div>';
    html += '<div class="weather-detail">' + esc(cond);
    if (humid != null) html += '<br>Humidity: ' + humid + '%';
    html += '</div>';
    html += '</div>';

    // Forecast
    if (forecastData && forecastData.length > 1) {
      html += '<div class="weather-forecast">';
      var days = forecastData.slice(1, FORECAST_DAYS + 1);
      for (var i = 0; i < days.length; i++) {
        var day = days[i];
        var hi = Math.round(day.temperature);
        var lo = day.templow != null ? Math.round(day.templow) : '';
        html += '<div class="wf-day">';
        html += '<div class="wf-name">' + shortDay(day.datetime.split('T')[0]) + '</div>';
        html += '<div><span class="wf-hi">' + hi + '\u00B0</span>';
        if (lo !== '') html += ' <span class="wf-lo">' + lo + '\u00B0</span>';
        html += '</div>';
        html += '<div class="wf-cond">' + formatCondition(day.condition) + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    document.getElementById('weather-section').innerHTML = html;
  }

  // subscribeForecast is now handled in wsBootstrap()

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: CALENDAR
  // ══════════════════════════════════════════════════════════

  function fetchCalendar() {
    if (!wsReady) return;

    var now = new Date();
    var start = now.toISOString();
    var end = new Date(now.getTime() + 7 * 86400000).toISOString();
    var all = [];
    var pending = CALENDARS.length;

    CALENDARS.forEach(function(cal) {
      if (!states[cal.entity]) { if (--pending === 0) renderCalendar(all); return; }
      var path = '/api/calendars/' + cal.entity
        + '?start=' + encodeURIComponent(start)
        + '&end=' + encodeURIComponent(end);

      signPath(path, function(signed) {
        if (!signed) { if (--pending === 0) renderCalendar(all); return; }
        fetch(signed).then(function(r) { return r.json(); })
          .then(function(evts) {
            evts.forEach(function(ev) { ev._color = cal.color; });
            all = all.concat(evts);
          })
          .catch(function() {})
          .then(function() { if (--pending === 0) renderCalendar(all); });
      });
    });
  }

  function renderCalendar(events) {
    events.sort(function(a, b) {
      return (a.start.dateTime || a.start.date || '')
        .localeCompare(b.start.dateTime || b.start.date || '');
    });
    calendarEvents = events;

    var html = '';
    var lastDay = '';

    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      var s = ev.start.dateTime || ev.start.date;
      var d = new Date(s);
      var dayKey = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

      if (dayKey !== lastDay) {
        html += '<div class="cal-day-header">' + esc(dayKey) + '</div>';
        lastDay = dayKey;
      }

      var time = '';
      if (ev.start.dateTime) {
        time = new Date(ev.start.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (ev.end && ev.end.dateTime) {
          time += ' \u2013 ' + new Date(ev.end.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }
      } else {
        time = 'All day';
      }

      var title = ev.summary || ev.title || '(No title)';
      html += '<div class="cal-event" style="border-left-color:' + ev._color + '">';
      html += '<div class="cal-ev-title">' + esc(title) + '</div>';
      html += '<div class="cal-ev-time">' + esc(time) + '</div>';
      html += '</div>';
    }

    if (!events.length) {
      html = '<div class="cal-empty">No events this week</div>';
    }

    document.getElementById('calendar-section').innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: DETECTION STRIP (event-driven FIFO)
  // ══════════════════════════════════════════════════════════

  // Build a lookup set for fast entity matching in the event callback
  var DETECT_ENTITIES = {};
  for (var di = 0; di < DETECTIONS.length; di++) {
    DETECT_ENTITIES[DETECTIONS[di].entity] = DETECTIONS[di].name;
  }

  // FIFO queue: newest at index 0, max DETECT_SLOTS entries
  var detectionQueue = [];

  function addDetection(entityId, name, picture, changedAt) {
    // Add to front of queue
    detectionQueue.unshift({
      entity: entityId,
      name: name,
      picture: picture,
      time: changedAt
    });
    // Trim to max slots
    if (detectionQueue.length > DETECT_SLOTS) {
      detectionQueue.length = DETECT_SLOTS;
    }
    renderDetectionStrip();
  }

  function renderDetectionStrip() {
    var el = document.getElementById('detection-strip');

    // Release old images before replacing
    var oldImgs = el.querySelectorAll('img');
    for (var k = 0; k < oldImgs.length; k++) oldImgs[k].src = BLANK;

    var html = '';
    for (var i = 0; i < DETECT_SLOTS; i++) {
      html += '<div class="det">';
      if (i < detectionQueue.length) {
        var det = detectionQueue[i];
        html += '<div class="det-img">';
        if (det.picture) {
          html += '<img data-pic="' + det.picture + '" alt="">';
        }
        html += '</div>';
        html += '<div class="det-info">';
        html += '<span class="det-name">' + esc(det.name) + '</span>';
        if (det.time) {
          html += ' <span class="det-time">' + fmtTime(det.time) + '</span>';
        }
        html += '</div>';
      } else {
        // Empty slot
        html += '<div class="det-img"></div>';
        html += '<div class="det-info"><span class="det-name" style="opacity:0.3">No detection</span></div>';
      }
      html += '</div>';
    }
    el.innerHTML = html;

    // Sign and load detection images
    var imgs = el.querySelectorAll('img[data-pic]');
    for (var j = 0; j < imgs.length; j++) {
      (function(img) {
        var p = img.getAttribute('data-pic');
        var sep = p.indexOf('?') > -1 ? '&' : '?';
        signPath(p + sep + 't=' + Date.now(), function(url) {
          if (url) img.src = url;
        });
      })(imgs[j]);
    }
  }

  // subscribeDetections is now handled in wsBootstrap() via the unified state_changed subscription

  // Seed the strip with current detection states on startup
  function seedDetections() {
    // Gather all detection entities that have pictures, sort by last_changed
    var initial = [];
    for (var i = 0; i < DETECTIONS.length; i++) {
      var det = DETECTIONS[i];
      var st = states[det.entity];
      if (st && st.attributes && st.attributes.entity_picture) {
        initial.push({
          entity: det.entity,
          name: det.name,
          picture: st.attributes.entity_picture,
          time: st.last_changed
        });
      }
    }
    // Sort newest first
    initial.sort(function(a, b) {
      return (b.time || '').localeCompare(a.time || '');
    });
    detectionQueue = initial.slice(0, DETECT_SLOTS);
    renderDetectionStrip();
  }

  // Update relative timestamps periodically (without re-fetching images)
  function updateDetectionTimes() {
    var infos = document.querySelectorAll('.det-time');
    for (var i = 0; i < infos.length && i < detectionQueue.length; i++) {
      infos[i].textContent = fmtTime(detectionQueue[i].time);
    }
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD TIMER MANAGEMENT
  // ══════════════════════════════════════════════════════════

  var dashTimers = [];

  function startDashboardTimers() {
    stopDashboardTimers();
    syncCamera();
    refreshCamera();
    renderChips();
    renderWeather();
    seedDetections();
    fetchCalendar();

    camRefreshInterval = setInterval(refreshCamera, CAM_REFRESH_MS);
    camSyncInterval = setInterval(syncCamera, CAM_SYNC_MS);
    dashTimers.push(camRefreshInterval, camSyncInterval);
    dashTimers.push(setInterval(renderChips, 30000));
    dashTimers.push(setInterval(renderWeather, WEATHER_MS));
    dashTimers.push(setInterval(updateDetectionTimes, 60000)); // update relative timestamps every minute
    dashTimers.push(setInterval(fetchCalendar, CALENDAR_MS));
  }

  function stopDashboardTimers() {
    for (var i = 0; i < dashTimers.length; i++) clearInterval(dashTimers[i]);
    dashTimers = [];
    // Release camera images
    camImgA.src = BLANK;
    camImgB.src = BLANK;
  }

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER: PHOTO SLIDESHOW
  // ══════════════════════════════════════════════════════════

  function showNextPhoto() {
    if (!PHOTOFRAME_URL) return;
    clearTimeout(ssLoadTimer);

    var back = (ssFront === 'a') ? ssPhotoB : ssPhotoA;
    var front = (ssFront === 'a') ? ssPhotoA : ssPhotoB;

    back.onload = function() {
      clearTimeout(ssLoadTimer);
      back.classList.add('visible');
      // After crossfade completes, release old image
      setTimeout(function() {
        front.classList.remove('visible');
        front.onload = null;
        front.onerror = null;
        front.src = BLANK;
      }, 1600);
      ssFront = (ssFront === 'a') ? 'b' : 'a';
    };
    back.onerror = function() {
      clearTimeout(ssLoadTimer);
      ssLoadTimer = setTimeout(showNextPhoto, 5000);
    };
    ssLoadTimer = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      ssLoadTimer = setTimeout(showNextPhoto, 5000);
    }, 8000);

    back.src = PHOTOFRAME_URL + '/random?w=1280&h=800&t=' + Date.now();
  }

  function startScreensaver() {
    showNextPhoto();
    if (ssSlideTimer) clearInterval(ssSlideTimer);
    ssSlideTimer = setInterval(showNextPhoto, PHOTO_MS);
    renderSSClock();
    renderSSWeather();
    renderSSNextEvent();
    renderSSDebug();
  }

  function stopScreensaver() {
    if (ssSlideTimer) { clearInterval(ssSlideTimer); ssSlideTimer = null; }
    clearTimeout(ssLoadTimer);
    ssPhotoA.onload = null; ssPhotoA.onerror = null;
    ssPhotoB.onload = null; ssPhotoB.onerror = null;
    ssPhotoA.src = BLANK; ssPhotoB.src = BLANK;
    ssPhotoA.classList.remove('visible');
    ssPhotoB.classList.remove('visible');
    ssFront = 'a';
  }

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER: CLOCK + WEATHER
  // ══════════════════════════════════════════════════════════

  function renderSSClock() {
    var now = new Date();
    document.getElementById('ss-clock').textContent =
      now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    document.getElementById('ss-date').textContent =
      now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function renderSSWeather() {
    var entity = states[WEATHER_ENTITY];
    if (!entity) return;

    var temp = Math.round(entity.attributes.temperature);
    var unit = entity.attributes.temperature_unit || '\u00B0F';
    var cond = formatCondition(entity.state);
    document.getElementById('ss-weather').textContent =
      temp + unit + '  \u00B7  ' + cond;

    // Forecast
    if (forecastData && forecastData.length > 1) {
      var el = document.getElementById('ss-forecast');
      var days = forecastData.slice(1, FORECAST_DAYS + 1);
      var html = '';
      for (var i = 0; i < days.length; i++) {
        var day = days[i];
        var hi = Math.round(day.temperature);
        var lo = day.templow != null ? Math.round(day.templow) : '';
        html += '<div class="ss-fc-day">';
        html += '<div class="ss-fc-name">' + shortDay(day.datetime.split('T')[0]) + '</div>';
        html += '<div><span class="ss-fc-hi">' + hi + '\u00B0</span>';
        if (lo !== '') html += ' <span class="ss-fc-lo">' + lo + '\u00B0</span>';
        html += '</div>';
        html += '<div class="ss-fc-cond">' + formatCondition(day.condition) + '</div>';
        html += '</div>';
      }
      el.innerHTML = html;
    }
  }

  function renderSSNextEvent() {
    var el = document.getElementById('ss-nextevent');
    if (!calendarEvents.length) { el.textContent = ''; return; }

    var now = new Date();
    var next = null;
    for (var i = 0; i < calendarEvents.length; i++) {
      var ev = calendarEvents[i];
      var s = ev.start.dateTime || ev.start.date;
      var e = ev.end ? (ev.end.dateTime || ev.end.date) : s;
      if (new Date(e) > now) { next = ev; break; }
    }
    if (!next) { el.textContent = ''; return; }

    var title = next.summary || next.title || '(No title)';
    var startStr = next.start.dateTime || next.start.date;
    var startDt = new Date(startStr);
    var diffMs = startDt - now;

    var prefix;
    if (diffMs <= 0) {
      prefix = 'Now';
    } else if (diffMs < 3600000) {
      prefix = 'In ' + Math.ceil(diffMs / 60000) + 'min';
    } else if (diffMs < 86400000) {
      var hrs = Math.floor(diffMs / 3600000);
      var mins = Math.ceil((diffMs % 3600000) / 60000);
      prefix = 'In ' + hrs + 'h' + (mins > 0 ? ' ' + mins + 'm' : '');
    } else {
      prefix = shortDay(startStr.split('T')[0]);
    }

    if (!next.start.dateTime) {
      el.textContent = '\uD83D\uDCC5  ' + title;
    } else {
      el.textContent = '\uD83D\uDCC5  ' + prefix + ' \u00B7 ' + title;
    }
  }

  // Debug info for screensaver overlay — frozen value = time of death
  var pageLoadTime = Date.now();
  var jsErrors = 0;
  var lastError = '';
  var fetchCount = 0;
  var fetchFails = 0;

  // Catch unhandled errors
  window.onerror = function(msg, src, line) {
    jsErrors++;
    lastError = (msg + '').substring(0, 60) + ' L' + line;
  };

  // Patch fetch to track request count and failures
  var _origFetch = window.fetch;
  window.fetch = function() {
    fetchCount++;
    return _origFetch.apply(this, arguments).then(function(r) {
      if (!r.ok) fetchFails++;
      return r;
    }, function(e) {
      fetchFails++;
      throw e;
    });
  };

  function renderSSDebug() {
    var lines = [];

    // Line 1: uptime, heap, tick
    var p1 = [];
    var uptimeSec = Math.floor((Date.now() - pageLoadTime) / 1000);
    var uptimeMin = Math.floor(uptimeSec / 60);
    var uptimeHr = Math.floor(uptimeMin / 60);
    if (uptimeHr > 0) {
      p1.push('up:' + uptimeHr + 'h' + (uptimeMin % 60) + 'm');
    } else {
      p1.push('up:' + uptimeMin + 'm');
    }

    if (performance && performance.memory) {
      var used = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
      var total = (performance.memory.totalJSHeapSize / 1048576).toFixed(1);
      var limit = (performance.memory.jsHeapSizeLimit / 1048576).toFixed(0);
      p1.push('heap:' + used + '/' + total + 'MB (max ' + limit + ')');
    }

    var now = new Date();
    p1.push('tick:' + now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' }));
    lines.push(p1.join(' | '));

    // Line 2: dom, images, fetches, errors
    var imgCount = document.getElementsByTagName('img').length;
    var domCount = document.getElementsByTagName('*').length;
    var p2 = [];
    p2.push('dom:' + domCount + ' img:' + imgCount);
    p2.push('fetch:' + fetchCount + (fetchFails ? ' fail:' + fetchFails : ''));
    if (jsErrors > 0) p2.push('err:' + jsErrors);
    lines.push(p2.join(' | '));

    // Line 3: last error (if any)
    if (lastError) lines.push(lastError);

    if (DEBUG_MODE) {
      document.getElementById('ss-debug').textContent = lines.join('\n');
      document.getElementById('ss-debug').style.whiteSpace = 'pre';
    }
  }

  // Anti-burn-in: slow bounce (1 update/sec, ~1px/sec drift)
  var bounceX = 40, bounceY = 40;
  var bounceDX = 1, bounceDY = 0.7;

  setInterval(function() {
    if (!isScreensaver) return;
    var ow = ssOverlay.offsetWidth || 200;
    var oh = ssOverlay.offsetHeight || 150;
    var maxX = window.innerWidth - ow - 20;
    var maxY = window.innerHeight - oh - 20;
    bounceX += bounceDX;
    bounceY += bounceDY;
    if (bounceX <= 20 || bounceX >= maxX) bounceDX = -bounceDX;
    if (bounceY <= 20 || bounceY >= maxY) bounceDY = -bounceDY;
    bounceX = Math.max(20, Math.min(bounceX, maxX));
    bounceY = Math.max(20, Math.min(bounceY, maxY));
    ssOverlay.style.left = bounceX + 'px';
    ssOverlay.style.top = bounceY + 'px';
  }, 1000);

  // Screensaver clock + debug update
  setInterval(function() {
    if (isScreensaver) {
      renderSSClock();
      renderSSWeather();
      renderSSNextEvent();
      renderSSDebug();
    }
  }, 30000);

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════

  function init() {
    dbg('init() — showing dashboard');
    // Keep debug overlay visible in debug mode (no auto-hide)
    showDashboard();

    // Screensaver photos served by photoframe-server (no pre-loading needed)
  }

  // Catch all unhandled errors visibly
  window.addEventListener('error', function(e) {
    dbg('ERROR: ' + e.message + ' @ ' + (e.filename||'').split('/').pop() + ':' + e.lineno);
  });

  // Resolve HA_URL from page origin if served from HA /local/ path
  if (!HA_URL) {
    HA_URL = location.protocol + '//' + location.host;
  }
  dbg('HA_URL resolved: ' + HA_URL);

  // Guard: token is required
  if (!HA_TOKEN) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e1e1e1;font-size:20px;text-align:center;padding:40px">'
      + 'No HA token configured.<br>Set HA_TOKEN in the HTML or pass <code>?token=YOUR_TOKEN</code> in the URL.</div>';
  } else {
    wsConnect();
  }

})();
</script>
</body>
