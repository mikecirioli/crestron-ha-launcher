<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crestron Panel Lite v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111318;
    color: #e1e1e1;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* ══════════════════════════════════════════════════════════
     DASHBOARD VIEW
     ══════════════════════════════════════════════════════════ */
  #dashboard {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }
  #dashboard.hidden { display: none; }

  /* ── Row 1: Chips bar ──────────────────────────────────── */
  .chips-bar {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    height: 54px;
    -webkit-flex: 0 0 54px;
    flex: 0 0 54px;
    background: rgba(0,0,0,0.3);
  }

  /* ── Row 2: Main content (camera + info) ─────────────── */
  .main-row {
    display: -webkit-flex;
    display: flex;
    -webkit-flex: 1 1 auto;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    height: 36px;
  }
  .chip-icon {
    font-size: 18px;
    opacity: 0.8;
    width: 20px;
    text-align: center;
  }
  .chip.on {
    background: rgba(255,193,7,0.2);
    color: #ffc107;
  }
  .chip-spacer { flex: 1; }

  /* ── Row 2, Col 1: Camera ──────────────────────────────── */
  .camera-area {
    -webkit-flex: 2 1 0%;
    flex: 2 1 0%;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  .cam-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .camera-label {
    position: absolute;
    top: 10px;
    left: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
  }

  /* ── Row 2, Col 2: Info column ─────────────────────────── */
  .info-area {
    -webkit-flex: 1 1 0%;
    flex: 1 1 0%;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Weather section */
  .weather-section {
    flex: 0 0 auto;
    padding: 10px 16px 6px;
    background: rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .weather-current {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .weather-temp {
    font-size: 38px;
    font-weight: 300;
    line-height: 1;
  }
  .weather-detail {
    font-size: 13px;
    opacity: 0.8;
    line-height: 1.4;
  }

  /* Hourly forecast bars */
  .hourly-forecast {
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 6px;
  }
  .hf-row {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 22px;
    font-size: 12px;
  }
  .hf-time {
    width: 42px;
    text-align: right;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .hf-icon {
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    font-size: 13px;
  }
  .hf-temp {
    width: 32px;
    text-align: right;
    font-weight: 500;
    flex-shrink: 0;
  }
  .hf-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .hf-bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #4fc3f7, #ff8a65);
  }

  /* Thermostat section */
  .thermostat-section {
    flex: 0 0 auto;
    padding: 8px 16px;
    background: rgba(0,0,0,0.15);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  .thermo-temp {
    font-size: 22px;
    font-weight: 300;
    line-height: 1;
  }
  .thermo-detail {
    font-size: 12px;
    opacity: 0.7;
    line-height: 1.3;
  }
  .thermo-action {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
  }
  .thermo-action.cooling { background: rgba(79,195,247,0.2); color: #4fc3f7; }
  .thermo-action.heating { background: rgba(255,138,101,0.2); color: #ff8a65; }
  .thermo-action.idle { background: rgba(255,255,255,0.08); color: #888; }
  .thermo-action.off { background: rgba(255,255,255,0.05); color: #666; }

  /* Calendar section */
  .calendar-section {
    flex: 0 1 auto;
    max-height: 40%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .calendar-section::-webkit-scrollbar { width: 4px; }
  .calendar-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* Mini camera cycle widget */
  .mini-cam {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    overflow: hidden;
    background: #000;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .mini-cam-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .mini-cam-label {
    position: absolute;
    top: 6px;
    left: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    z-index: 2;
  }

  /* Screensaver mode picker */
  .ss-mode-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .ss-mode-bar:active { background: rgba(255,255,255,0.08); }
  .ss-mode-icon { font-size: 16px; opacity: 0.7; }
  .ss-mode-label {
    flex: 1;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ss-mode-arrow {
    font-size: 11px;
    opacity: 0.4;
    transition: transform 0.2s;
  }
  .ss-mode-bar.open .ss-mode-arrow { transform: rotate(180deg); }

  .ss-mode-picker {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 70%;
    background: #1a1d23;
    border-top: 1px solid rgba(255,255,255,0.1);
    overflow-y: auto;
    z-index: 50;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .ss-mode-picker.visible { display: block; }
  .ss-mode-picker::-webkit-scrollbar { width: 4px; }
  .ss-mode-picker::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .ss-mode-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
  }
  .ss-mode-option:active { background: rgba(255,255,255,0.08); }
  .ss-mode-option.selected { color: #4fc3f7; }
  .ss-mode-radio {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    position: relative;
  }
  .ss-mode-option.selected .ss-mode-radio {
    border-color: #4fc3f7;
  }
  .ss-mode-option.selected .ss-mode-radio::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4fc3f7;
  }
  .ss-mode-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 2px 14px;
  }

  .cal-day-header {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    margin: 8px 0 3px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cal-day-header:first-child { margin-top: 6px; }
  .cal-day-header.today { color: #4fc3f7; }
  .cal-day-header.tomorrow { color: #81c784; }
  .cal-event {
    padding: 4px 10px;
    border-left: 4px solid;
    margin: 0 6px 3px 6px;
    border-radius: 0 4px 4px 0;
    background: rgba(255,255,255,0.07);
  }
  .cal-ev-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }
  .cal-ev-time {
    font-size: 11px;
    color: #aaa;
  }
  .cal-empty {
    color: #666;
    text-align: center;
    padding: 20px 10px;
    font-size: 14px;
  }

  /* ── Row 3: Detection strip ────────────────────────────── */
  .detection-strip {
    display: -webkit-flex;
    display: flex;
    gap: 3px;
    height: 120px;
    -webkit-flex: 0 0 120px;
    flex: 0 0 120px;
    overflow: hidden;
    background: #111318;
  }
  .det {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-flex: 1 1 0%;
    flex: 1 1 0%;
    overflow: hidden;
    background: #1a1a1a;
    border-radius: 3px;
    height: 120px;
  }
  .det-img {
    flex: 1 1 auto;
    overflow: hidden;
    min-height: 0;
  }
  .det-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .det-info {
    flex: 0 0 16px;
    padding: 1px 4px 2px;
    font-size: 9px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: rgba(0,0,0,0.4);
  }
  .det-name { opacity: 0.85; }
  .det-time { opacity: 0.45; }

  /* ══════════════════════════════════════════════════════════
     SCREENSAVER VIEW
     ══════════════════════════════════════════════════════════ */
  #screensaver {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 100;
  }
  #screensaver.hidden { display: none; }

  .ss-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .ss-layer.visible { opacity: 1; }

  .ss-overlay {
    position: fixed;
    background: rgba(0, 0, 0, 0.35);
    color: #fff;
    padding: 16px 24px;
    border-radius: 14px;
    z-index: 110;
    text-align: right;
  }
  .ss-overlay .ss-clock {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .ss-overlay .ss-date {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 2px;
  }
  .ss-overlay .ss-weather {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.9;
    margin-top: 6px;
  }
  .ss-overlay .ss-nextevent {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 6px;
  }
  .ss-overlay .ss-forecast {
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 8px;
    display: flex;
    gap: 16px;
    justify-content: flex-end;
  }
  .ss-overlay .ss-fc-day {
    text-align: center;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.4;
  }
  .ss-fc-day .ss-fc-name { font-weight: 600; font-size: 13px; }
  .ss-fc-day .ss-fc-hi { font-weight: 500; }
  .ss-fc-day .ss-fc-lo { opacity: 0.6; }
  .ss-fc-day .ss-fc-cond { font-size: 11px; opacity: 0.7; }
  .ss-debug {
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 4px;
    font-size: 10px;
    font-family: monospace;
    opacity: 0.45;
    line-height: 1.3;
  }
</style>
</head>
<body>

  <!-- ════ DEBUG STATUS (visible until dashboard renders) ══ -->
  <div id="dbg" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font:12px monospace;padding:8px;white-space:pre-wrap;max-height:50%;overflow-y:auto;display:none"></div>

  <!-- ════ DASHBOARD ═══════════════════════════════════════ -->
  <div id="dashboard">
    <div class="chips-bar" id="chips-bar"></div>
    <div class="main-row">
      <div class="camera-area">
        <img id="cam-img-a" class="cam-layer" alt="">
        <img id="cam-img-b" class="cam-layer" style="opacity:0" alt="">
        <div class="camera-label" id="cam-label"></div>
      </div>
      <div class="info-area">
        <div class="weather-section" id="weather-section"></div>
        <div class="thermostat-section" id="thermostat-section"></div>
        <div class="calendar-section" id="calendar-section"></div>
        <div class="mini-cam" id="mini-cam">
          <img id="mini-cam-a" class="mini-cam-layer" alt="">
          <img id="mini-cam-b" class="mini-cam-layer" style="opacity:0" alt="">
          <div class="mini-cam-label" id="mini-cam-label"></div>
        </div>
        <div class="ss-mode-bar" id="ss-mode-bar">
          <span class="ss-mode-icon" id="ss-mode-icon"></span>
          <span class="ss-mode-label" id="ss-mode-label">Photo Frame</span>
          <span class="ss-mode-arrow">&#x25BC;</span>
        </div>
        <div class="ss-mode-picker" id="ss-mode-picker"></div>
      </div>
    </div>
    <div class="detection-strip" id="detection-strip"></div>
  </div>

  <!-- ════ SCREENSAVER ═════════════════════════════════════ -->
  <div id="screensaver" class="hidden">
    <img id="ss-photo-a" class="ss-layer" alt="">
    <img id="ss-photo-b" class="ss-layer" alt="">
    <div class="ss-overlay" id="ss-overlay">
      <div class="ss-clock" id="ss-clock"></div>
      <div class="ss-date" id="ss-date"></div>
      <div class="ss-weather" id="ss-weather"></div>
      <div class="ss-nextevent" id="ss-nextevent"></div>
      <div class="ss-forecast" id="ss-forecast"></div>
      <div class="ss-debug" id="ss-debug"></div>
    </div>
  </div>

<script src="panel-lite-config.js"></script>
<script>
// Early diagnostic — runs even if main script has parse errors
// Visible with ?debug=1 or #debug (hash works around Crestron BROWSEROPEN mangling = and &)
if (location.search.indexOf('debug=1') !== -1 || location.hash.indexOf('debug') !== -1) {
  document.getElementById('dbg').style.display = '';
}
document.getElementById('dbg').textContent = 'EARLY: page loaded\nUA: ' + navigator.userAgent;
</script>
<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('dbg');
  if (d) { d.style.display = ''; d.textContent += '\nERROR: ' + msg + ' @ line ' + line + ':' + col; }
};
(function() {
  'use strict';

  // ══════════════════════════════════════════════════════════
  // CONFIGURATION — loaded from panel-lite-config.js
  // Edit that file for secrets, entities, and tuning.
  // ══════════════════════════════════════════════════════════

  var C = window.PANEL_CONFIG || {};

  var HA_URL            = C.HA_URL   || '';
  var HA_TOKEN          = C.HA_TOKEN || '';
  var PHOTOFRAME_URL    = C.PHOTOFRAME_URL || '';
  var FRIGATE_URL       = C.FRIGATE_URL || '';
  var CAMERAS           = C.CAMERAS  || [];
  var CALENDARS         = C.CALENDARS  || [];
  var CHIPS             = C.CHIPS      || [];
  var WEATHER_ENTITY    = C.WEATHER_ENTITY  || 'weather.forecast_home';
  var THERMOSTAT_ENTITY = C.THERMOSTAT_ENTITY || '';
  var HOURLY_HOURS      = C.HOURLY_HOURS   || 5;
  // v2: CAMERA_SELECTOR no longer used (main cam is PRIMARY_CAM, mini cam cycles via photoframe-server)
  var CAM_REFRESH_MS    = C.CAM_REFRESH_MS  || 3000;
  var CAM_SYNC_MS       = C.CAM_SYNC_MS     || 1500;
  var CALENDAR_MS       = C.CALENDAR_MS     || 300000;
  var WEATHER_MS        = C.WEATHER_MS      || 300000;
  var DETECT_SLOTS      = C.DETECT_SLOTS    || 7;
  var DETECT_MS         = C.DETECT_MS       || 30000;
  var PHOTO_MS          = C.PHOTO_MS        || 30000;
  var IDLE_TIMEOUT      = C.IDLE_TIMEOUT    || 120000;
  var SS_DRIFT_MS       = C.SS_DRIFT_MS     || 120000;
  var FORECAST_DAYS     = C.FORECAST_DAYS   || 3;
  var WS_RECONNECT_MS   = C.WS_RECONNECT_MS || 5000;
  var WATCH_REFRESH_MS  = C.WATCH_REFRESH_MS || 2000;
  var WATCH_TIMEOUT_MS  = C.WATCH_TIMEOUT_MS || 300000; // 5 min
  var PHOTO_FIT         = C.PHOTO_FIT || 'contain';  // 'contain' (fit) or 'cover' (fill/crop)
  var PRIMARY_CAM       = C.PRIMARY_CAM || 'gatetown';  // v2: single cam for main display
  var MINI_CAM_REFRESH_MS = C.MINI_CAM_REFRESH_MS || 3000;
  var MINI_CAM_CYCLE_SEC  = C.MINI_CAM_CYCLE_SEC  || 10;  // seconds per camera in mini cycle

  // 1x1 transparent GIF — forces Chromium 95 to actually free decoded bitmap
  // (img.src = '' does NOT release GPU memory in this WebView version)
  var BLANK = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';

  // URL params can override config — but Crestron BROWSEROPEN mangles = and &,
  // so these only work from a real browser, not from the console.
  function getParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }
  var urlToken = getParam('token');
  var urlHaUrl = getParam('ha_url');
  if (urlToken) HA_TOKEN = urlToken;
  if (urlHaUrl) HA_URL = urlHaUrl.replace(/\/+$/, '');
  var urlPhotos = getParam('photos');
  if (urlPhotos) PHOTOFRAME_URL = urlPhotos.replace(/\/+$/, '');

  // Debug mode: ?debug=1 (browser) or #debug (Crestron-safe)
  var DEBUG_MODE = getParam('debug') === '1' || location.hash.indexOf('debug') !== -1;

  // ══════════════════════════════════════════════════════════
  // DEBUG STATUS OVERLAY
  // ══════════════════════════════════════════════════════════

  var dbgEl = document.getElementById('dbg');
  var dbgLines = [];
  function dbg(msg) {
    var ts = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    dbgLines.push('[' + ts + '] ' + msg);
    if (dbgLines.length > 30) dbgLines.shift();
    if (dbgEl && DEBUG_MODE) dbgEl.textContent = dbgLines.join('\n');
  }
  dbg('page loaded');
  dbg('UA: ' + navigator.userAgent);
  dbg('URL: ' + location.href);
  dbg('HA_URL: ' + (HA_URL || '(auto-detect pending)'));
  dbg('HA_TOKEN: ' + (HA_TOKEN ? HA_TOKEN.substring(0, 20) + '...' : 'MISSING'));
  dbg('FRIGATE: ' + (FRIGATE_URL || 'not configured'));
  dbg('PHOTOS: ' + (PHOTOFRAME_URL || 'not configured'));
  dbg('WebSocket: ' + (typeof WebSocket));
  dbg('fetch: ' + (typeof fetch));

  // ══════════════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════════════

  var states = {};   // entity_id → state object (our own cache)
  var idleTimer = null;
  var manualScreensaver = false;
  var isScreensaver = false;
  var isCameraWatch = false;
  var cwTimeoutTimer = null;

  // Screensaver photo state
  var ssLoadTimer = null;
  var ssSlideTimer = null;

  // Screensaver mode: 'photo', 'camera-cycle', or 'camera:<name>'
  var ssMode = 'photo';
  var ssCameraList = [];      // fetched from photoframe-server
  var ssCamIndex = 0;         // current index in cycle mode
  var ssCamCycleCounter = 0;  // ticks since last camera switch
  var SS_CAM_REFRESH_MS = 2000;   // camera snapshot refresh rate
  var SS_CAM_CYCLE_SEC = 5;       // seconds per camera when cycling
  var ssCamRefreshTimer = null;
  var ssCamPending = false;

  // Load saved screensaver mode
  try {
    var saved = localStorage.getItem('ssMode');
    if (saved) ssMode = saved;
  } catch(e) {}

  // v2: Primary camera state (single cam from photoframe-server)
  var primaryCamTimer = null;
  var primaryCamPending = false;

  // v2: Mini camera cycle state
  var miniCamList = [];        // fetched from photoframe-server
  var miniCamIndex = 0;
  var miniCamCycleCounter = 0;
  var miniCamTimer = null;
  var miniCamPending = false;

  // Timers (stored for cleanup)

  // DOM refs
  var dashEl = document.getElementById('dashboard');
  var ssEl = document.getElementById('screensaver');
  var camImgA = document.getElementById('cam-img-a');
  var camImgB = document.getElementById('cam-img-b');
  var camFront = 'a';  // which layer is currently visible

  var ssPhotoB = document.getElementById('ss-photo-b');
  var ssFront = 'a';
  var ssOverlay = document.getElementById('ss-overlay');

  var miniCamA = document.getElementById('mini-cam-a');
  var miniCamB = document.getElementById('mini-cam-b');

  // ══════════════════════════════════════════════════════════
  // WEBSOCKET CONNECTION
  // ══════════════════════════════════════════════════════════

  var ws = null;
  var wsId = 1;        // incrementing message ID
  var wsPending = {};  // id → {callback, subscription} map
  var wsReady = false;
  var wsReconnectTimer = null;

  function wsConnect() {
    wsReady = false;
    wsId = 1;
    wsPending = {};

    var wsUrl = HA_URL.replace(/^http/, 'ws') + '/api/websocket';
    dbg('ws connecting: ' + wsUrl);
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      dbg('ws constructor error: ' + e.message);
      return;
    }
    dbg('ws object created, readyState=' + ws.readyState);

    ws.onopen = function() {
      dbg('ws onopen, readyState=' + ws.readyState);
    };

    ws.onmessage = function(evt) {
      var msg;
      try { msg = JSON.parse(evt.data); } catch (e) { return; }

      if (msg.type === 'auth_required') {
        dbg('ws auth_required, sending token...');
        ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));
        return;
      }

      if (msg.type === 'auth_ok') {
        dbg('ws auth_ok! bootstrapping...');
        wsReady = true;
        wsBootstrap();
        return;
      }

      if (msg.type === 'auth_invalid') {
        dbg('ws AUTH FAILED: ' + msg.message);
        ws.close();
        return;
      }

      // Route responses and subscription events by id
      if (msg.id && wsPending[msg.id]) {
        var handler = wsPending[msg.id];
        if (msg.type === 'result') {
          if (handler.callback) handler.callback(msg.success ? msg.result : null);
          if (!handler.subscription) delete wsPending[msg.id];
        } else if (msg.type === 'event') {
          if (handler.callback) handler.callback(msg.event);
        }
      }
    };

    ws.onclose = function(evt) {
      dbg('ws closed: code=' + evt.code + ' reason=' + (evt.reason || 'none'));
      wsReady = false;
      ws = null;
      clearTimeout(wsReconnectTimer);
      wsReconnectTimer = setTimeout(wsConnect, WS_RECONNECT_MS);
    };

    ws.onerror = function(evt) {
      dbg('ws error event');
    };
  }

  function wsSend(msg, callback, subscription) {
    if (!ws || !wsReady) return 0;
    var id = wsId++;
    msg.id = id;
    if (callback) wsPending[id] = { callback: callback, subscription: !!subscription };
    ws.send(JSON.stringify(msg));
    return id;
  }

  function wsCallService(domain, service, data, target) {
    var msg = { type: 'call_service', domain: domain, service: service };
    if (data) msg.service_data = data;
    if (target) msg.target = target;
    wsSend(msg);
  }

  function wsBootstrap() {
    // 1. Fetch all states
    dbg('get_states...');
    wsSend({ type: 'get_states' }, function(result) {
      if (!result) { dbg('get_states FAILED'); return; }
      states = {};
      for (var i = 0; i < result.length; i++) {
        states[result[i].entity_id] = result[i];
      }
      dbg('got ' + result.length + ' states');
      // 2. Subscribe to state changes (keeps cache fresh)
      wsSend(
        { type: 'subscribe_events', event_type: 'state_changed' },
        function(evt) {
          if (!evt || !evt.data) return;
          var eid = evt.data.entity_id;
          if (evt.data.new_state) {
            states[eid] = evt.data.new_state;
          } else {
            delete states[eid]; // entity removed
          }
        },
        true // subscription
      );

      // 3. Subscribe to daily weather forecast
      wsSend(
        { type: 'weather/subscribe_forecast', forecast_type: 'daily', entity_id: WEATHER_ENTITY },
        function(msg) {
          if (msg && msg.forecast) {
            forecastData = msg.forecast;
            if (!isScreensaver) renderWeather();
            renderSSWeather();
          }
        },
        true // subscription
      );

      // 3b. Subscribe to hourly weather forecast
      wsSend(
        { type: 'weather/subscribe_forecast', forecast_type: 'hourly', entity_id: WEATHER_ENTITY },
        function(msg) {
          if (msg && msg.forecast) {
            hourlyData = msg.forecast;
            if (!isScreensaver) renderWeather();
          }
        },
        true // subscription
      );

      // 4. Start the UI
      init();
    });
  }

  // ══════════════════════════════════════════════════════════
  // HA HELPERS
  // ══════════════════════════════════════════════════════════

  function signPath(path, cb) {
    if (!wsReady) return cb(null);
    wsSend(
      { type: 'auth/sign_path', path: path, expires: 300 },
      function(result) {
        if (!result || !result.path) return cb(null);
        // sign_path returns a relative path — make it absolute
        cb(HA_URL + result.path);
      }
    );
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatCondition(state) {
    return state.replace(/-/g, ' ').replace(/_/g, ' ')
      .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function shortDay(dateStr) {
    var d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString([], { weekday: 'short' });
  }

  function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var m = Math.floor((new Date() - d) / 60000);
    if (m < 1) return 'Just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }


  // ══════════════════════════════════════════════════════════
  // VIEW SWITCHING
  // ══════════════════════════════════════════════════════════

  // ── Reload-based transitions ─────────────────────────────
  // Every dash↔screensaver transition reloads the page for a
  // clean memory slate.  Hash fragments carry intent + debug flag.

  function showDashboard() {
    isScreensaver = false;
    isCameraWatch = false;
    ssEl.classList.add('hidden');
    dashEl.classList.remove('hidden');
    stopScreensaver();
    stopCameraWatch();
    startDashboardTimers();
    startIdleTimer();
  }

  function showScreensaver() {
    isScreensaver = true;
    isCameraWatch = false;
    dashEl.classList.add('hidden');
    ssEl.classList.remove('hidden');
    stopDashboardTimers();
    stopCameraWatch();
    startScreensaver();
  }

  function showCameraWatch() {
    isCameraWatch = true;
    isScreensaver = true;  // reuse overlay bounce + clock updates
    dashEl.classList.add('hidden');
    ssEl.classList.remove('hidden');
    stopDashboardTimers();
    stopScreensaver();
    startCameraWatch();
    clearTimeout(idleTimer);
    cwTimeoutTimer = setTimeout(function() {
      dbg('cw: timeout, returning to dashboard');
      showDashboard();
    }, WATCH_TIMEOUT_MS);
  }

  // ══════════════════════════════════════════════════════════
  // IDLE DETECTION
  // ══════════════════════════════════════════════════════════

  function startIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function() {
      showScreensaver();
    }, IDLE_TIMEOUT);
  }

  function onActivity() {
    if (manualScreensaver) return;
    if (isScreensaver) {
      showDashboard();
    }
    startIdleTimer();
  }

  // Touch/mouse only (not keydown, to avoid conflicts with side buttons)
  ['touchstart', 'mousedown', 'mousemove'].forEach(function(evt) {
    document.addEventListener(evt, onActivity, { capture: true, passive: true });
  });

  // Chip click delegation (chips rebuilt via innerHTML, so use permanent listener)
  document.getElementById('chips-bar').addEventListener('click', function(e) {
    var t = e.target;
    while (t && t !== this) {
      if (t.id === 'chip-watch') { showCameraWatch(); return; }
      t = t.parentElement;
    }
  });

  // ══════════════════════════════════════════════════════════
  // SIDE BUTTON HANDLER (TSW-1060)
  // ══════════════════════════════════════════════════════════

  // TSW-1060 hardware buttons set e.code but e.key is null
  var BUTTON_MAP = {
    'BrowserBack':     'standby',
    'Home':            'go-home',
    'AudioVolumeUp':   'cam-next',
    'AudioVolumeDown': 'cam-prev',
    'AudioVolumeMute': 'toggle-ss'
  };

  window.addEventListener('keydown', function(e) {
    dbg('KEY: code=' + e.code + ' key=' + e.key);
    var action = BUTTON_MAP[e.code] || BUTTON_MAP[e.key];
    if (!action) return;
    dbg('BUTTON: ' + action);
    e.preventDefault();
    e.stopPropagation();

    switch (action) {
      case 'go-home':
        manualScreensaver = false;
        showDashboard();
        break;
      case 'toggle-ss':
        if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
        } else {
          manualScreensaver = true;
          clearTimeout(idleTimer);
          showScreensaver();
        }
        break;
      case 'cam-next':
        if (isCameraWatch) {
          cycleWatchCamera('next');
        } else if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
        } else {
          cycleMiniCam('next');
        }
        startIdleTimer();
        break;
      case 'cam-prev':
        if (isCameraWatch) {
          cycleWatchCamera('prev');
        } else if (isScreensaver) {
          manualScreensaver = false;
          showDashboard();
        } else {
          cycleMiniCam('prev');
        }
        startIdleTimer();
        break;
      case 'standby':
        dbg('standby');
        wsCallService('shell_command', 'crestron_standby');
        break;
    }
  }, true);

  function cycleMiniCam(direction) {
    if (miniCamList.length < 2) return;
    if (direction === 'next') {
      miniCamIndex = (miniCamIndex + 1) % miniCamList.length;
    } else {
      miniCamIndex = (miniCamIndex - 1 + miniCamList.length) % miniCamList.length;
    }
    miniCamCycleCounter = 0;
    miniCamPending = false;
    refreshMiniCam();
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: CHIPS BAR
  // ══════════════════════════════════════════════════════════

  function renderChips() {
    var now = new Date();
    var timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    var dateStr = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

    var html = '';
    html += '<div class="chip"><span class="chip-icon">\u23F0</span>' + esc(timeStr) + '</div>';
    html += '<div class="chip"><span class="chip-icon">\uD83D\uDCC5</span>' + esc(dateStr) + '</div>';
    html += '<div class="chip" id="chip-watch"><span class="chip-icon">\uD83D\uDCF9</span>Watch</div>';
    html += '<div class="chip-spacer"></div>';

    for (var i = 0; i < CHIPS.length; i++) {
      var c = CHIPS[i];
      var st = states[c.entity];
      var isOn = st && (st.state === 'on' || st.state === 'cleaning' ||
                        st.state === 'home');
      html += '<div class="chip' + (isOn ? ' on' : '') + '">';
      html += '<span class="chip-icon">' + c.icon + '</span>';
      html += esc(c.name);
      html += '</div>';
    }

    document.getElementById('chips-bar').innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: PRIMARY CAMERA (v2 — single cam from photoframe-server)
  // ══════════════════════════════════════════════════════════

  function refreshPrimaryCam() {
    if (!PHOTOFRAME_URL || !PRIMARY_CAM) return;
    if (primaryCamPending) return;
    primaryCamPending = true;
    camLabel.textContent = PRIMARY_CAM;

    var back = (camFront === 'a') ? camImgB : camImgA;
    var front = (camFront === 'a') ? camImgA : camImgB;

    var loadTimeout = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      primaryCamPending = false;
      schedulePrimaryCam();
    }, 6000);

    back.onload = function() {
      clearTimeout(loadTimeout);
      back.style.opacity = '1';
      front.style.opacity = '0';
      camFront = (camFront === 'a') ? 'b' : 'a';
      primaryCamPending = false;
      schedulePrimaryCam();
    };
    back.onerror = function() {
      clearTimeout(loadTimeout);
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      primaryCamPending = false;
      schedulePrimaryCam();
    };

    back.src = PHOTOFRAME_URL + '/camera/' + PRIMARY_CAM + '?t=' + Date.now();
  }

  function schedulePrimaryCam() {
    clearTimeout(primaryCamTimer);
    primaryCamTimer = setTimeout(refreshPrimaryCam, 2000);
  }

  function stopPrimaryCam() {
    clearTimeout(primaryCamTimer);
    primaryCamTimer = null;
    primaryCamPending = false;
    camImgA.onload = null; camImgA.onerror = null;
    camImgB.onload = null; camImgB.onerror = null;
    camImgA.src = BLANK; camImgB.src = BLANK;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: MINI CAMERA CYCLE (v2 — cycles through photoframe-server cameras)
  // ══════════════════════════════════════════════════════════

  function refreshMiniCam() {
    if (!PHOTOFRAME_URL || miniCamList.length === 0) return;
    if (miniCamPending) return;
    miniCamPending = true;

    var camName = miniCamList[miniCamIndex % miniCamList.length];
    miniCamLabel.textContent = camName;

    var back = (miniCamFront === 'a') ? miniCamB : miniCamA;
    var front = (miniCamFront === 'a') ? miniCamA : miniCamB;

    var loadTimeout = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      miniCamPending = false;
      scheduleMiniCam();
    }, 6000);

    back.onload = function() {
      clearTimeout(loadTimeout);
      back.style.opacity = '1';
      front.style.opacity = '0';
      miniCamFront = (miniCamFront === 'a') ? 'b' : 'a';
      miniCamPending = false;
      scheduleMiniCam();
    };
    back.onerror = function() {
      clearTimeout(loadTimeout);
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      miniCamPending = false;
      scheduleMiniCam();
    };

    back.src = PHOTOFRAME_URL + '/camera/' + camName + '?t=' + Date.now();
  }

  function scheduleMiniCam() {
    clearTimeout(miniCamTimer);
    miniCamTimer = setTimeout(function() {
      // Advance camera periodically
      if (miniCamList.length > 1) {
        miniCamCycleCounter++;
        var ticksPerCycle = Math.max(1, Math.round((MINI_CAM_CYCLE_SEC * 1000) / MINI_CAM_REFRESH_MS));
        if (miniCamCycleCounter >= ticksPerCycle) {
          miniCamCycleCounter = 0;
          miniCamIndex = (miniCamIndex + 1) % miniCamList.length;
        }
      }
      refreshMiniCam();
    }, MINI_CAM_REFRESH_MS);
  }

  function stopMiniCam() {
    clearTimeout(miniCamTimer);
    miniCamTimer = null;
    miniCamPending = false;
    miniCamA.onload = null; miniCamA.onerror = null;
    miniCamB.onload = null; miniCamB.onerror = null;
    miniCamA.src = BLANK; miniCamB.src = BLANK;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: WEATHER
  // ══════════════════════════════════════════════════════════

  var forecastData = null;
  var hourlyData = null;
  var calendarEvents = [];

  var conditionIcons = {
    'clear-night': '\uD83C\uDF19', 'cloudy': '\u2601\uFE0F', 'fog': '\uD83C\uDF2B\uFE0F',
    'hail': '\uD83C\uDF28\uFE0F', 'lightning': '\u26A1', 'lightning-rainy': '\u26C8\uFE0F',
    'partlycloudy': '\u26C5', 'pouring': '\uD83C\uDF27\uFE0F', 'rainy': '\uD83C\uDF27\uFE0F',
    'snowy': '\u2744\uFE0F', 'snowy-rainy': '\uD83C\uDF28\uFE0F', 'sunny': '\u2600\uFE0F',
    'windy': '\uD83D\uDCA8', 'windy-variant': '\uD83D\uDCA8', 'exceptional': '\u26A0\uFE0F'
  };

  function condIcon(condition) {
    return conditionIcons[condition] || '\uD83C\uDF24\uFE0F';
  }

  function renderWeather() {
    var entity = states[WEATHER_ENTITY];
    if (!entity) return;

    var temp = Math.round(entity.attributes.temperature);
    var unit = entity.attributes.temperature_unit || '\u00B0F';
    var cond = formatCondition(entity.state);
    var humid = entity.attributes.humidity;

    var html = '';
    html += '<div class="weather-current">';
    html += '<div class="weather-temp">' + temp + '<span style="font-size:18px">' + esc(unit) + '</span></div>';
    html += '<div class="weather-detail">' + esc(cond);
    if (humid != null) html += '<br>Humidity: ' + humid + '%';
    html += '</div>';
    html += '</div>';

    // Hourly forecast bars
    if (hourlyData && hourlyData.length > 0) {
      var hours = hourlyData.slice(0, HOURLY_HOURS);
      // Find temp range for bar scaling
      var temps = hours.map(function(h) { return h.temperature; });
      var minT = Math.min.apply(null, temps);
      var maxT = Math.max.apply(null, temps);
      var range = maxT - minT;
      if (range < 2) { minT -= 1; maxT += 1; range = maxT - minT; }

      html += '<div class="hourly-forecast">';
      for (var i = 0; i < hours.length; i++) {
        var h = hours[i];
        var hTemp = Math.round(h.temperature);
        var hTime = new Date(h.datetime);
        var timeStr = hTime.toLocaleTimeString([], { hour: 'numeric' });
        var pct = ((h.temperature - minT) / range) * 100;
        // Bar starts from left edge proportional to temp, width is a dot-like indicator
        var left = Math.max(0, Math.min(pct - 4, 92));
        var width = Math.max(8, 100 - left);

        html += '<div class="hf-row">';
        html += '<span class="hf-time">' + esc(timeStr) + '</span>';
        html += '<span class="hf-icon">' + condIcon(h.condition) + '</span>';
        html += '<span class="hf-temp">' + hTemp + '\u00B0</span>';
        html += '<div class="hf-bar-bg"><div class="hf-bar-fill" style="left:' + left + '%;width:' + width + '%"></div></div>';
        html += '</div>';
      }
      html += '</div>';
    }

    document.getElementById('weather-section').innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: THERMOSTAT
  // ══════════════════════════════════════════════════════════

  function renderThermostat() {
    var el = document.getElementById('thermostat-section');
    if (!THERMOSTAT_ENTITY) { el.style.display = 'none'; return; }
    var entity = states[THERMOSTAT_ENTITY];
    if (!entity) { el.style.display = 'none'; return; }

    var attrs = entity.attributes;
    var currentTemp = attrs.current_temperature != null ? Math.round(attrs.current_temperature) : '--';
    var unit = attrs.temperature_unit || (states[WEATHER_ENTITY] && states[WEATHER_ENTITY].attributes.temperature_unit) || '\u00B0F';
    var action = attrs.hvac_action || entity.state;  // hvac_action if available, else mode
    var actionLabel = formatCondition(action);

    // Target temp display
    var target = '';
    if (attrs.temperature != null) {
      target = Math.round(attrs.temperature) + '\u00B0';
    } else if (attrs.target_temp_high != null && attrs.target_temp_low != null) {
      target = Math.round(attrs.target_temp_low) + '\u00B0\u2013' + Math.round(attrs.target_temp_high) + '\u00B0';
    }

    var actionClass = 'idle';
    if (action === 'cooling') actionClass = 'cooling';
    else if (action === 'heating') actionClass = 'heating';
    else if (action === 'off' || entity.state === 'off') actionClass = 'off';

    var html = '';
    html += '<span style="font-size:18px;opacity:0.7">\uD83C\uDF21\uFE0F</span>';
    html += '<div class="thermo-temp">' + currentTemp + '<span style="font-size:12px">' + esc(unit) + '</span></div>';
    html += '<div class="thermo-detail">';
    if (target && entity.state !== 'off') html += 'Set: ' + target;
    html += '</div>';
    html += '<div class="thermo-action ' + actionClass + '">' + esc(actionLabel) + '</div>';

    el.style.display = '';
    el.innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: CALENDAR
  // ══════════════════════════════════════════════════════════

  function fetchCalendar() {
    if (!wsReady) return;

    var now = new Date();
    var start = now.toISOString();
    var end = new Date(now.getTime() + 7 * 86400000).toISOString();
    var all = [];
    var pending = CALENDARS.length;

    CALENDARS.forEach(function(cal) {
      if (!states[cal.entity]) { if (--pending === 0) renderCalendar(all); return; }
      var path = '/api/calendars/' + cal.entity
        + '?start=' + encodeURIComponent(start)
        + '&end=' + encodeURIComponent(end);

      signPath(path, function(signed) {
        if (!signed) { if (--pending === 0) renderCalendar(all); return; }
        fetch(signed).then(function(r) { return r.json(); })
          .then(function(evts) {
            evts.forEach(function(ev) { ev._color = cal.color; });
            all = all.concat(evts);
          })
          .catch(function() {})
          .then(function() { if (--pending === 0) renderCalendar(all); });
      });
    });
  }

  function renderCalendar(events) {
    events.sort(function(a, b) {
      return (a.start.dateTime || a.start.date || '')
        .localeCompare(b.start.dateTime || b.start.date || '');
    });
    calendarEvents = events;

    var now = new Date();
    var todayStr = now.toISOString().split('T')[0];
    var tomorrow = new Date(now.getTime() + 86400000);
    var tomorrowStr = tomorrow.toISOString().split('T')[0];

    var html = '';
    var lastDay = '';

    // Filter out past events (except all-day events for today)
    var filtered = [];
    for (var j = 0; j < events.length; j++) {
      var ev = events[j];
      var eEnd = ev.end ? (ev.end.dateTime || ev.end.date) : (ev.start.dateTime || ev.start.date);
      if (new Date(eEnd) >= now) filtered.push(ev);
    }

    for (var i = 0; i < filtered.length; i++) {
      var ev = filtered[i];
      var s = ev.start.dateTime || ev.start.date;
      var d = new Date(s);
      var evDay = s.split('T')[0] || s;

      // Determine day label with contextual names
      var dayKey;
      var dayClass = '';
      if (evDay === todayStr) {
        dayKey = 'Today';
        dayClass = ' today';
      } else if (evDay === tomorrowStr) {
        dayKey = 'Tomorrow';
        dayClass = ' tomorrow';
      } else {
        dayKey = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      }

      if (dayKey !== lastDay) {
        html += '<div class="cal-day-header' + dayClass + '">' + esc(dayKey) + '</div>';
        lastDay = dayKey;
      }

      var time = '';
      if (ev.start.dateTime) {
        time = new Date(ev.start.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (ev.end && ev.end.dateTime) {
          time += ' \u2013 ' + new Date(ev.end.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }
      } else {
        time = 'All day';
      }

      var title = ev.summary || ev.title || '(No title)';
      html += '<div class="cal-event" style="border-left-color:' + ev._color + '">';
      html += '<div class="cal-ev-title">' + esc(title) + '</div>';
      html += '<div class="cal-ev-time">' + esc(time) + '</div>';
      html += '</div>';
    }

    if (!filtered.length) {
      html = '<div class="cal-empty">No upcoming events</div>';
    }

    document.getElementById('calendar-section').innerHTML = html;
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD: DETECTION STRIP (Frigate API polling)
  // ══════════════════════════════════════════════════════════
  // Polls Frigate's /api/events endpoint for the N most recent person
  // detections across all cameras. Thumbnails served directly by Frigate.

  var detectionQueue = [];
  var detSlots = [];  // persistent DOM references — never recreated

  // Build detection strip DOM once; reuse elements on every poll
  function initDetectionStrip() {
    var el = document.getElementById('detection-strip');
    el.innerHTML = '';
    detSlots = [];
    for (var i = 0; i < DETECT_SLOTS; i++) {
      var wrap = document.createElement('div');
      wrap.className = 'det';
      var imgWrap = document.createElement('div');
      imgWrap.className = 'det-img';
      var img = document.createElement('img');
      img.alt = '';
      img.src = BLANK;
      imgWrap.appendChild(img);
      var info = document.createElement('div');
      info.className = 'det-info';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'det-name';
      nameSpan.style.opacity = '0.3';
      nameSpan.textContent = 'No detection';
      var timeSpan = document.createElement('span');
      timeSpan.className = 'det-time';
      info.appendChild(nameSpan);
      info.appendChild(document.createTextNode(' '));
      info.appendChild(timeSpan);
      wrap.appendChild(imgWrap);
      wrap.appendChild(info);
      el.appendChild(wrap);
      detSlots.push({ img: img, name: nameSpan, time: timeSpan, curId: null });
    }
  }

  function fetchDetections() {
    if (!FRIGATE_URL) return;
    var url = FRIGATE_URL + '/api/events?limit=' + DETECT_SLOTS +
              '&has_snapshot=1&label=person';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.timeout = 10000;
    xhr.onload = function() {
      if (xhr.status !== 200) return;
      try {
        var events = JSON.parse(xhr.responseText);
        detectionQueue = [];
        for (var i = 0; i < events.length && i < DETECT_SLOTS; i++) {
          var ev = events[i];
          detectionQueue.push({
            id: ev.id,
            camera: ev.camera,
            time: new Date(ev.start_time * 1000).toISOString()
          });
        }
        updateDetectionSlots();
      } catch (e) {
        dbg('detection parse error: ' + e.message);
      }
    };
    xhr.onerror = function() { dbg('detection fetch error'); };
    xhr.send();
  }

  // Update persistent DOM — only change src when event ID differs
  function updateDetectionSlots() {
    for (var i = 0; i < DETECT_SLOTS; i++) {
      var slot = detSlots[i];
      if (!slot) continue;
      if (i < detectionQueue.length) {
        var det = detectionQueue[i];
        if (slot.curId !== det.id) {
          slot.img.src = BLANK;  // release old bitmap first
          slot.img.src = FRIGATE_URL + '/api/events/' + det.id + '/thumbnail.jpg?h=100';
          slot.curId = det.id;
        }
        slot.name.textContent = det.camera;
        slot.name.style.opacity = '0.85';
        slot.time.textContent = fmtTime(det.time);
      } else {
        if (slot.curId !== null) {
          slot.img.src = BLANK;
          slot.curId = null;
        }
        slot.name.textContent = 'No detection';
        slot.name.style.opacity = '0.3';
        slot.time.textContent = '';
      }
    }
  }

  function updateDetectionTimes() {
    for (var i = 0; i < detSlots.length && i < detectionQueue.length; i++) {
      detSlots[i].time.textContent = fmtTime(detectionQueue[i].time);
    }
  }

  // ══════════════════════════════════════════════════════════
  // CAMERA WATCH MODE (v2 — uses photoframe-server)
  // ══════════════════════════════════════════════════════════
  // Full-screen single-camera view reusing the screensaver DOM.
  // Returns to dashboard after WATCH_TIMEOUT_MS or on touch/click.

  var cwPending = false;
  var cwRefreshTimer = null;
  var cwCamName = '';  // v2: camera name string instead of index

  function startCameraWatch() {
    cwCamName = (miniCamList.length > 0) ? miniCamList[miniCamIndex % miniCamList.length] : PRIMARY_CAM;
    dbg('cw: start, camera=' + cwCamName);
    // Disable crossfade for camera watch
    ssPhotoA.style.transition = 'none';
    ssPhotoB.style.transition = 'none';
    refreshWatchCamera();
    renderSSClock();
    renderSSWeather();
    renderSSNextEvent();
    renderSSDebug();
  }

  function stopCameraWatch() {
    clearTimeout(cwRefreshTimer);
    cwRefreshTimer = null;
    if (cwTimeoutTimer) { clearTimeout(cwTimeoutTimer); cwTimeoutTimer = null; }
    cwPending = false;
    ssPhotoA.style.transition = 'opacity 1.5s ease-in-out';
    ssPhotoB.style.transition = 'opacity 1.5s ease-in-out';
  }

  function refreshWatchCamera() {
    if (!cwCamName || !PHOTOFRAME_URL) return;
    if (cwPending) return;
    cwPending = true;

    var back = (ssFront === 'a') ? ssPhotoB : ssPhotoA;
    var front = (ssFront === 'a') ? ssPhotoA : ssPhotoB;

    var loadTimeout = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      cwPending = false;
      scheduleWatchRefresh();
    }, 6000);

    back.onload = function() {
      clearTimeout(loadTimeout);
      back.classList.add('visible');
      setTimeout(function() {
        front.classList.remove('visible');
        front.onload = null;
        front.onerror = null;
        front.src = BLANK;
      }, 400);
      ssFront = (ssFront === 'a') ? 'b' : 'a';
      cwPending = false;
      scheduleWatchRefresh();
    };
    back.onerror = function() {
      clearTimeout(loadTimeout);
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      cwPending = false;
      scheduleWatchRefresh();
    };

    back.src = PHOTOFRAME_URL + '/camera/' + cwCamName + '?t=' + Date.now();
  }

  function scheduleWatchRefresh() {
    clearTimeout(cwRefreshTimer);
    cwRefreshTimer = setTimeout(refreshWatchCamera, WATCH_REFRESH_MS);
  }

  function cycleWatchCamera(dir) {
    // v2: cycle through all cameras from photoframe-server
    var allCams = ssCameraList.length > 0 ? ssCameraList : miniCamList;
    if (allCams.length < 2) return;
    var curIdx = 0;
    for (var i = 0; i < allCams.length; i++) {
      if (allCams[i] === cwCamName) { curIdx = i; break; }
    }
    if (dir === 'next') {
      curIdx = (curIdx + 1) % allCams.length;
    } else {
      curIdx = (curIdx - 1 + allCams.length) % allCams.length;
    }
    cwCamName = allCams[curIdx];
    dbg('cw: cycle to ' + cwCamName);
    cwPending = false;
    refreshWatchCamera();
    renderSSClock();
    // Reset the 5-min timeout on interaction
    if (cwTimeoutTimer) clearTimeout(cwTimeoutTimer);
    cwTimeoutTimer = setTimeout(function() {
      dbg('cw: timeout, returning to dashboard');
      showDashboard();
    }, WATCH_TIMEOUT_MS);
  }

  // ══════════════════════════════════════════════════════════
  // DASHBOARD TIMER MANAGEMENT
  // ══════════════════════════════════════════════════════════

  var dashTimers = [];

  function startDashboardTimers() {
    stopDashboardTimers();
    if (!detSlots.length) initDetectionStrip();
    // v2: start primary cam and mini cycle (both use photoframe-server)
    refreshPrimaryCam();
    miniCamCycleCounter = 0;
    miniCamIndex = 0;
    refreshMiniCam();
    renderChips();
    renderWeather();
    renderThermostat();
    fetchDetections();
    fetchCalendar();

    dashTimers.push(setInterval(renderChips, 30000));
    dashTimers.push(setInterval(renderWeather, WEATHER_MS));
    dashTimers.push(setInterval(renderThermostat, 60000));
    dashTimers.push(setInterval(fetchDetections, DETECT_MS));
    dashTimers.push(setInterval(updateDetectionTimes, 60000));
    dashTimers.push(setInterval(fetchCalendar, CALENDAR_MS));
  }

  function stopDashboardTimers() {
    for (var i = 0; i < dashTimers.length; i++) clearInterval(dashTimers[i]);
    dashTimers = [];
    stopPrimaryCam();
    stopMiniCam();
    // Release detection thumbnails
    for (var i = 0; i < detSlots.length; i++) {
      detSlots[i].img.src = BLANK;
      detSlots[i].curId = null;
    }
  }

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER: PHOTO SLIDESHOW
  // ══════════════════════════════════════════════════════════

  function showNextPhoto() {
    if (!PHOTOFRAME_URL) return;
    clearTimeout(ssLoadTimer);

    var back = (ssFront === 'a') ? ssPhotoB : ssPhotoA;
    var front = (ssFront === 'a') ? ssPhotoA : ssPhotoB;

    back.onload = function() {
      clearTimeout(ssLoadTimer);
      back.classList.add('visible');
      // After crossfade completes, release old image
      setTimeout(function() {
        front.classList.remove('visible');
        front.onload = null;
        front.onerror = null;
        front.src = BLANK;
      }, 1600);
      ssFront = (ssFront === 'a') ? 'b' : 'a';
    };
    back.onerror = function() {
      clearTimeout(ssLoadTimer);
      ssLoadTimer = setTimeout(showNextPhoto, 5000);
    };
    ssLoadTimer = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      ssLoadTimer = setTimeout(showNextPhoto, 5000);
    }, 8000);

    back.src = PHOTOFRAME_URL + '/random?w=1280&h=800&t=' + Date.now();
  }

  function startScreensaver() {
    if (ssMode === 'photo') {
      showNextPhoto();
      if (ssSlideTimer) clearInterval(ssSlideTimer);
      ssSlideTimer = setInterval(showNextPhoto, PHOTO_MS);
      renderSSClock();
      renderSSWeather();
      renderSSNextEvent();
      renderSSDebug();
    } else {
      startCameraScreensaver();
    }
  }

  function stopScreensaver() {
    // Stop photo mode
    if (ssSlideTimer) { clearInterval(ssSlideTimer); ssSlideTimer = null; }
    clearTimeout(ssLoadTimer);
    // Stop camera mode
    stopCameraScreensaver();
    // Clean up images
    ssPhotoA.onload = null; ssPhotoA.onerror = null;
    ssPhotoB.onload = null; ssPhotoB.onerror = null;
    ssPhotoA.src = BLANK; ssPhotoB.src = BLANK;
    ssPhotoA.classList.remove('visible');
    ssPhotoB.classList.remove('visible');
    ssFront = 'a';
  }

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER: CLOCK + WEATHER
  // ══════════════════════════════════════════════════════════

  function renderSSClock() {
    var now = new Date();
    document.getElementById('ss-clock').textContent =
      now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    var dateText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    if (isCameraWatch && cwCamName) {
      dateText = cwCamName + '  \u00B7  ' + dateText;
    } else if (isScreensaver && ssMode !== 'photo') {
      var camName = getCameraName();
      if (camName) dateText = camName + '  \u00B7  ' + dateText;
    }
    document.getElementById('ss-date').textContent = dateText;
  }

  function renderSSWeather() {
    var entity = states[WEATHER_ENTITY];
    if (!entity) return;

    var temp = Math.round(entity.attributes.temperature);
    var unit = entity.attributes.temperature_unit || '\u00B0F';
    var cond = formatCondition(entity.state);
    document.getElementById('ss-weather').textContent =
      temp + unit + '  \u00B7  ' + cond;

    // Forecast
    if (forecastData && forecastData.length > 1) {
      var el = document.getElementById('ss-forecast');
      var days = forecastData.slice(1, FORECAST_DAYS + 1);
      var html = '';
      for (var i = 0; i < days.length; i++) {
        var day = days[i];
        var hi = Math.round(day.temperature);
        var lo = day.templow != null ? Math.round(day.templow) : '';
        html += '<div class="ss-fc-day">';
        html += '<div class="ss-fc-name">' + shortDay(day.datetime.split('T')[0]) + '</div>';
        html += '<div><span class="ss-fc-hi">' + hi + '\u00B0</span>';
        if (lo !== '') html += ' <span class="ss-fc-lo">' + lo + '\u00B0</span>';
        html += '</div>';
        html += '<div class="ss-fc-cond">' + formatCondition(day.condition) + '</div>';
        html += '</div>';
      }
      el.innerHTML = html;
    }
  }

  function renderSSNextEvent() {
    var el = document.getElementById('ss-nextevent');
    if (!calendarEvents.length) { el.textContent = ''; return; }

    var now = new Date();
    var next = null;
    for (var i = 0; i < calendarEvents.length; i++) {
      var ev = calendarEvents[i];
      var s = ev.start.dateTime || ev.start.date;
      var e = ev.end ? (ev.end.dateTime || ev.end.date) : s;
      if (new Date(e) > now) { next = ev; break; }
    }
    if (!next) { el.textContent = ''; return; }

    var title = next.summary || next.title || '(No title)';
    var startStr = next.start.dateTime || next.start.date;
    var startDt = new Date(startStr);
    var diffMs = startDt - now;

    var prefix;
    if (diffMs <= 0) {
      prefix = 'Now';
    } else if (diffMs < 3600000) {
      prefix = 'In ' + Math.ceil(diffMs / 60000) + 'min';
    } else if (diffMs < 86400000) {
      var hrs = Math.floor(diffMs / 3600000);
      var mins = Math.ceil((diffMs % 3600000) / 60000);
      prefix = 'In ' + hrs + 'h' + (mins > 0 ? ' ' + mins + 'm' : '');
    } else {
      prefix = shortDay(startStr.split('T')[0]);
    }

    if (!next.start.dateTime) {
      el.textContent = '\uD83D\uDCC5  ' + title;
    } else {
      el.textContent = '\uD83D\uDCC5  ' + prefix + ' \u00B7 ' + title;
    }
  }

  // Debug info for screensaver overlay — frozen value = time of death
  var pageLoadTime = Date.now();
  var jsErrors = 0;
  var lastError = '';
  var fetchCount = 0;
  var fetchFails = 0;

  // Catch unhandled errors
  window.onerror = function(msg, src, line) {
    jsErrors++;
    lastError = (msg + '').substring(0, 60) + ' L' + line;
  };

  // Patch fetch to track request count and failures
  var _origFetch = window.fetch;
  window.fetch = function() {
    fetchCount++;
    return _origFetch.apply(this, arguments).then(function(r) {
      if (!r.ok) fetchFails++;
      return r;
    }, function(e) {
      fetchFails++;
      throw e;
    });
  };

  function renderSSDebug() {
    var lines = [];

    // Line 1: uptime, heap, tick
    var p1 = [];
    var uptimeSec = Math.floor((Date.now() - pageLoadTime) / 1000);
    var uptimeMin = Math.floor(uptimeSec / 60);
    var uptimeHr = Math.floor(uptimeMin / 60);
    if (uptimeHr > 0) {
      p1.push('up:' + uptimeHr + 'h' + (uptimeMin % 60) + 'm');
    } else {
      p1.push('up:' + uptimeMin + 'm');
    }

    if (performance && performance.memory) {
      var used = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
      var total = (performance.memory.totalJSHeapSize / 1048576).toFixed(1);
      var limit = (performance.memory.jsHeapSizeLimit / 1048576).toFixed(0);
      p1.push('heap:' + used + '/' + total + 'MB (max ' + limit + ')');
    }

    var now = new Date();
    p1.push('tick:' + now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' }));
    lines.push(p1.join(' | '));

    // Line 2: dom, images, fetches, errors
    var imgCount = document.getElementsByTagName('img').length;
    var domCount = document.getElementsByTagName('*').length;
    var p2 = [];
    p2.push('dom:' + domCount + ' img:' + imgCount);
    p2.push('fetch:' + fetchCount + (fetchFails ? ' fail:' + fetchFails : ''));
    if (jsErrors > 0) p2.push('err:' + jsErrors);
    lines.push(p2.join(' | '));

    // Line 3: last error (if any)
    if (lastError) lines.push(lastError);

    if (DEBUG_MODE) {
      document.getElementById('ss-debug').textContent = lines.join('\n');
      document.getElementById('ss-debug').style.whiteSpace = 'pre';
    }
  }

  // Anti-burn-in: slow bounce (1 update/sec, ~1px/sec drift)
  var bounceX = 40, bounceY = 40;
  var bounceDX = 1, bounceDY = 0.7;

  setInterval(function() {
    if (!isScreensaver) return;
    var ow = ssOverlay.offsetWidth || 200;
    var oh = ssOverlay.offsetHeight || 150;
    var maxX = window.innerWidth - ow - 20;
    var maxY = window.innerHeight - oh - 20;
    bounceX += bounceDX;
    bounceY += bounceDY;
    if (bounceX <= 20 || bounceX >= maxX) bounceDX = -bounceDX;
    if (bounceY <= 20 || bounceY >= maxY) bounceDY = -bounceDY;
    bounceX = Math.max(20, Math.min(bounceX, maxX));
    bounceY = Math.max(20, Math.min(bounceY, maxY));
    ssOverlay.style.left = bounceX + 'px';
    ssOverlay.style.top = bounceY + 'px';
  }, 1000);

  // Screensaver clock + debug update
  setInterval(function() {
    if (isScreensaver) {
      renderSSClock();
      renderSSWeather();
      renderSSNextEvent();
      renderSSDebug();
    }
  }, 30000);

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER MODE PICKER
  // ══════════════════════════════════════════════════════════

  var BLACKLISTED_CAMS = ['driveway'];

  function ssModeIcon(mode) {
    if (mode === 'photo') return '\uD83D\uDDBC';          // framed picture
    if (mode === 'camera-cycle') return '\uD83C\uDFA5';   // film camera
    return '\uD83D\uDCF7';                                 // camera
  }

  function ssModeDisplayName(mode) {
    if (mode === 'photo') return 'Photo Frame';
    if (mode === 'camera-cycle') return 'Cycle All Cameras';
    if (mode.indexOf('camera:') === 0) return mode.substring(7);
    return mode;
  }

  function updateModeBar() {
    document.getElementById('ss-mode-icon').textContent = ssModeIcon(ssMode);
    document.getElementById('ss-mode-label').textContent = ssModeDisplayName(ssMode);
  }

  function saveSsMode(mode) {
    ssMode = mode;
    try { localStorage.setItem('ssMode', mode); } catch(e) {}
    updateModeBar();
    dbg('ss: mode set to ' + mode);
  }

  function buildModePicker() {
    var picker = document.getElementById('ss-mode-picker');
    var html = '';
    var options = [
      { value: 'photo', label: 'Photo Frame' },
      { value: 'camera-cycle', label: 'Cycle All Cameras' }
    ];
    for (var i = 0; i < ssCameraList.length; i++) {
      options.push({ value: 'camera:' + ssCameraList[i], label: ssCameraList[i] });
    }
    for (var i = 0; i < options.length; i++) {
      var opt = options[i];
      var sel = (opt.value === ssMode) ? ' selected' : '';
      html += '<div class="ss-mode-option' + sel + '" data-ssmode="' + esc(opt.value) + '">';
      html += '<div class="ss-mode-radio"></div>';
      html += '<span>' + esc(opt.label) + '</span>';
      html += '</div>';
      if (i === 1 && ssCameraList.length > 0) {
        html += '<div class="ss-mode-divider"></div>';
      }
    }
    picker.innerHTML = html;
  }

  function toggleModePicker() {
    var bar = document.getElementById('ss-mode-bar');
    var picker = document.getElementById('ss-mode-picker');
    var isOpen = picker.classList.contains('visible');
    if (isOpen) {
      picker.classList.remove('visible');
      bar.classList.remove('open');
    } else {
      buildModePicker();
      picker.classList.add('visible');
      bar.classList.add('open');
    }
  }

  document.getElementById('ss-mode-bar').addEventListener('click', function(e) {
    e.stopPropagation();
    toggleModePicker();
  });

  document.getElementById('ss-mode-picker').addEventListener('click', function(e) {
    e.stopPropagation();
    var t = e.target;
    while (t && t !== this) {
      if (t.dataset && t.dataset.ssmode) {
        saveSsMode(t.dataset.ssmode);
        // Close picker
        this.classList.remove('visible');
        document.getElementById('ss-mode-bar').classList.remove('open');
        return;
      }
      t = t.parentElement;
    }
  });

  // Close picker when tapping elsewhere
  document.addEventListener('click', function() {
    var picker = document.getElementById('ss-mode-picker');
    if (picker.classList.contains('visible')) {
      picker.classList.remove('visible');
      document.getElementById('ss-mode-bar').classList.remove('open');
    }
  });

  // Fetch camera list from photoframe-server for the mode picker
  function fetchSSCameraList() {
    if (!PHOTOFRAME_URL) return;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', PHOTOFRAME_URL + '/camera/list?t=' + Date.now());
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var list = JSON.parse(xhr.responseText);
          if (Array.isArray(list)) {
            ssCameraList = [];
            for (var i = 0; i < list.length; i++) {
              var name = list[i];
              var skip = false;
              for (var b = 0; b < BLACKLISTED_CAMS.length; b++) {
                if (name.toLowerCase() === BLACKLISTED_CAMS[b].toLowerCase()) { skip = true; break; }
              }
              if (!skip) ssCameraList.push(name);
            }
            dbg('ss: camera list loaded (' + ssCameraList.length + ' cameras)');
            // v2: populate mini cam list (exclude primary cam)
            miniCamList = [];
            for (var j = 0; j < ssCameraList.length; j++) {
              if (ssCameraList[j].toLowerCase() !== PRIMARY_CAM.toLowerCase()) {
                miniCamList.push(ssCameraList[j]);
              }
            }
            dbg('v2: mini cam list: ' + miniCamList.length + ' cameras');
            // Kick off mini cam cycle now that we have the list
            if (miniCamList.length > 0 && !miniCamTimer) refreshMiniCam();
            // Validate saved mode — if camera was removed, fall back to photo
            if (ssMode.indexOf('camera:') === 0) {
              var camName = ssMode.substring(7);
              var found = false;
              for (var i = 0; i < ssCameraList.length; i++) {
                if (ssCameraList[i] === camName) { found = true; break; }
              }
              if (!found) saveSsMode('photo');
            }
            updateModeBar();
          }
        } catch(e) { dbg('ss: camera list parse error'); }
      }
    };
    xhr.onerror = function() { dbg('ss: camera list fetch failed'); };
    xhr.send();
  }

  // Initialize mode bar display
  updateModeBar();

  // ══════════════════════════════════════════════════════════
  // SCREENSAVER: CAMERA MODES
  // ══════════════════════════════════════════════════════════

  function getCameraName() {
    if (ssMode === 'camera-cycle') {
      if (ssCameraList.length === 0) return null;
      return ssCameraList[ssCamIndex % ssCameraList.length];
    }
    if (ssMode.indexOf('camera:') === 0) {
      return ssMode.substring(7);
    }
    return null;
  }

  function loadCameraSnapshot() {
    var camName = getCameraName();
    if (!camName || !PHOTOFRAME_URL) return;
    if (ssCamPending) return;
    ssCamPending = true;

    var back = (ssFront === 'a') ? ssPhotoB : ssPhotoA;
    var front = (ssFront === 'a') ? ssPhotoA : ssPhotoB;

    var loadTimeout = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      ssCamPending = false;
      scheduleCameraRefresh();
    }, 6000);

    back.onload = function() {
      clearTimeout(loadTimeout);
      back.classList.add('visible');
      setTimeout(function() {
        front.classList.remove('visible');
        front.onload = null;
        front.onerror = null;
        front.src = BLANK;
      }, 400);
      ssFront = (ssFront === 'a') ? 'b' : 'a';
      ssCamPending = false;
      scheduleCameraRefresh();
    };
    back.onerror = function() {
      clearTimeout(loadTimeout);
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      ssCamPending = false;
      scheduleCameraRefresh();
    };

    back.src = PHOTOFRAME_URL + '/camera/' + camName + '?t=' + Date.now();
  }

  function scheduleCameraRefresh() {
    clearTimeout(ssCamRefreshTimer);
    ssCamRefreshTimer = setTimeout(function() {
      // In cycle mode, advance camera periodically
      if (ssMode === 'camera-cycle' && ssCameraList.length > 1) {
        ssCamCycleCounter++;
        var ticksPerCycle = Math.max(1, Math.round((SS_CAM_CYCLE_SEC * 1000) / SS_CAM_REFRESH_MS));
        if (ssCamCycleCounter >= ticksPerCycle) {
          ssCamCycleCounter = 0;
          ssCamIndex = (ssCamIndex + 1) % ssCameraList.length;
        }
      }
      loadCameraSnapshot();
    }, SS_CAM_REFRESH_MS);
  }

  function startCameraScreensaver() {
    ssCamPending = false;
    ssCamCycleCounter = 0;
    ssCamIndex = 0;
    // Disable crossfade transition for camera mode (instant swap)
    ssPhotoA.style.transition = 'none';
    ssPhotoB.style.transition = 'none';
    loadCameraSnapshot();
    renderSSClock();
    renderSSWeather();
    renderSSNextEvent();
    renderSSDebug();
  }

  function stopCameraScreensaver() {
    clearTimeout(ssCamRefreshTimer);
    ssCamRefreshTimer = null;
    ssCamPending = false;
    // Restore crossfade transition
    ssPhotoA.style.transition = 'opacity 1.5s ease-in-out';
    ssPhotoB.style.transition = 'opacity 1.5s ease-in-out';
  }

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════

  function init() {
    dbg('init() — showing dashboard, ssMode=' + ssMode);
    fetchSSCameraList();
    showDashboard();
  }

  // Catch all unhandled errors visibly
  window.addEventListener('error', function(e) {
    dbg('ERROR: ' + e.message + ' @ ' + (e.filename||'').split('/').pop() + ':' + e.lineno);
  });

  // Resolve HA_URL from page origin if served from HA /local/ path
  if (!HA_URL) {
    HA_URL = location.protocol + '//' + location.host;
  }
  dbg('HA_URL resolved: ' + HA_URL);

  // Guard: token is required
  if (!HA_TOKEN) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e1e1e1;font-size:20px;text-align:center;padding:40px">'
      + 'No HA token configured.<br>Set HA_TOKEN in the HTML or pass <code>?token=YOUR_TOKEN</code> in the URL.</div>';
  } else {
    wsConnect();
  }

})();
</script>
