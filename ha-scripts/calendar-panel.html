<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Calendar Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1c;
    color: #fff;
    overflow-y: auto;
    overflow-x: hidden;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  body::-webkit-scrollbar { width: 4px; }
  body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .day-header {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin: 12px 0 4px 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .day-header:first-child { margin-top: 6px; }

  .event {
    padding: 5px 10px;
    border-left: 4px solid;
    margin: 0 6px 4px 6px;
    border-radius: 0 4px 4px 0;
    background: rgba(255,255,255,0.1);
  }
  .ev-time {
    font-size: 12px;
    color: #aaa;
  }
  .ev-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
    color: #fff;
  }
  .empty {
    color: #888;
    text-align: center;
    padding: 30px 10px;
    font-size: 16px;
  }
</style>
</head>
<body>
<div id="cal"></div>

<script>
(function() {
  'use strict';

  var CALENDARS = [
    'calendar.home',
    'calendar.mikecirioli_gmail_com',
    'calendar.birthdays',
    'calendar.wcpss_24_25_trad_calendar',
    'calendar.mcirioli_cloudbees_com',
    'calendar.jenkins'
  ];

  var PALETTE = ['#4285f4','#ea4335','#fbbc04','#34a853','#ff6d01','#46bdc6'];
  var CAL_COLORS = {};
  CALENDARS.forEach(function(c, i) { CAL_COLORS[c] = PALETTE[i % PALETTE.length]; });

  var REFRESH_MS = 300000; // 5 min
  var hass = null;

  function getHass() {
    try {
      var ha = window.parent.document.querySelector('home-assistant');
      return (ha && ha.hass) ? ha.hass : null;
    } catch (e) { return null; }
  }

  function signPath(path, cb) {
    if (!hass || !hass.connection) return cb(null);
    hass.connection.sendMessagePromise({
      type: 'auth/sign_path',
      path: path,
      expires: 300
    }).then(function(r) { cb(r.path); })
      .catch(function() { cb(null); });
  }

  function fetchEvents() {
    hass = getHass();
    if (!hass) return;

    var now = new Date();
    var start = now.toISOString();
    var end = new Date(now.getTime() + 7 * 86400000).toISOString();
    var all = [];
    var pending = CALENDARS.length;

    CALENDARS.forEach(function(cal) {
      if (!hass.states[cal]) { if (--pending === 0) render(all); return; }
      var path = '/api/calendars/' + cal
        + '?start=' + encodeURIComponent(start)
        + '&end=' + encodeURIComponent(end);

      signPath(path, function(signed) {
        if (!signed) { if (--pending === 0) render(all); return; }
        fetch(signed).then(function(r) { return r.json(); })
          .then(function(evts) {
            evts.forEach(function(ev) { ev._cal = cal; });
            all = all.concat(evts);
          })
          .catch(function() {})
          .then(function() { if (--pending === 0) render(all); });
      });
    });
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function render(events) {
    events.sort(function(a, b) {
      return (a.start.dateTime || a.start.date || '')
        .localeCompare(b.start.dateTime || b.start.date || '');
    });

    var html = '';
    var lastDay = '';

    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      var s = ev.start.dateTime || ev.start.date;
      var d = new Date(s);
      var dayKey = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

      if (dayKey !== lastDay) {
        html += '<div class="day-header">' + esc(dayKey) + '</div>';
        lastDay = dayKey;
      }

      var time = '';
      if (ev.start.dateTime) {
        time = new Date(ev.start.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (ev.end && ev.end.dateTime) {
          time += ' \u2013 ' + new Date(ev.end.dateTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }
      } else {
        time = 'All day';
      }

      var title = ev.summary || ev.title || '(No title)';
      var color = CAL_COLORS[ev._cal] || '#888';
      html += '<div class="event" style="border-left-color:' + color + '">';
      html += '<div class="ev-title">' + esc(title) + '</div>';
      html += '<div class="ev-time">' + esc(time) + '</div>';
      html += '</div>';
    }

    if (!events.length) {
      html = '<div class="empty">No events this week</div>';
    }

    document.getElementById('cal').innerHTML = html;
  }

  function init() {
    hass = getHass();
    if (!hass) return;
    fetchEvents();
    setInterval(fetchEvents, REFRESH_MS);
  }

  (function wait() {
    var ha;
    try { ha = window.parent.document.querySelector('home-assistant'); } catch(e) {}
    if (ha && ha.hass) return init();
    var n = 0;
    var iv = setInterval(function() {
      try { ha = window.parent.document.querySelector('home-assistant'); } catch(e) {}
      if (ha && ha.hass) { clearInterval(iv); init(); }
      if (++n > 300) clearInterval(iv);
    }, 100);
  })();
})();
</script>
</body>
</html>
