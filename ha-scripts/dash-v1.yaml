# ═══════════════════════════════════════════════════════════════════
# Crestron Display Dashboard  (TSW-1060: 1280×800)
# ═══════════════════════════════════════════════════════════════════
# Two views:
#   /home   — camera monitoring + controls (default)
#   /photos — full-screen photo frame (auto-switches on idle)
#
# Create this as a new dashboard in HA:
#   Settings > Dashboards > Add Dashboard
#   Name: "Crestron Display"  URL: "crestron-display"  Mode: YAML
# Then paste this YAML into the raw editor.
#
# Requires HACS cards: layout-card, mushroom, card-mod
# ═══════════════════════════════════════════════════════════════════

# WallPanel: chrome hiding ONLY (screensaver handled by crestron-panel.js)
wallpanel:
  enabled: true
  hide_toolbar: true
  show_toolbar_on_hover: true
  hide_sidebar: true
  fullscreen: false
  idle_time: 0

title: Crestron Display
views:
  # ── View 1: Dashboard ──────────────────────────────────────────
  # Standalone HTML page for pixel-perfect 1280×800 layout.
  # Reads HA state via parent window — same pattern as photoframe.
  - title: Home
    path: home
    type: panel
    cards:
      - type: iframe
        url: /local/crestron-dashboard.html
        aspect_ratio: "16:10"
        card_mod:
          style: |
            ha-card {
              height: 100vh !important;
              border: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
              padding: 0 !important;
              margin: 0 !important;
              overflow: hidden !important;
            }

  # ── View 2: Photo Frame ────────────────────────────────────────
  # Full-screen iframe to a self-contained slideshow page.
  # Completely isolated from the HA frontend — no camera streams,
  # no cards, no websocket chatter beyond the iframe.
  - title: Photos
    path: photos
    type: panel
    cards:
      - type: iframe
        url: /local/photoframe.html
        aspect_ratio: "16:10"
        card_mod:
          style: |
            ha-card {
              height: 100vh !important;
              border: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
              padding: 0 !important;
              margin: 0 !important;
              overflow: hidden !important;
            }
