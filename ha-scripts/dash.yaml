# ═══════════════════════════════════════════════════════════════════
# Crestron Display Dashboard  (TSW-1060: 1280×800)
# ═══════════════════════════════════════════════════════════════════
# Two views:
#   /home   — camera monitoring + controls (default)
#   /photos — full-screen photo frame (auto-switches on idle)
#
# Create this as a new dashboard in HA:
#   Settings > Dashboards > Add Dashboard
#   Name: "Crestron Display"  URL: "crestron-display"  Mode: YAML
# Then paste this YAML into the raw editor.
# ═══════════════════════════════════════════════════════════════════

# WallPanel: chrome hiding ONLY (screensaver handled by crestron-panel.js)
wallpanel:
  enabled: true
  hide_toolbar: true
  show_toolbar_on_hover: true
  hide_sidebar: true
  fullscreen: false
  idle_time: 0

title: Crestron Display
views:
  # ── View 1: Dashboard ──────────────────────────────────────────
  - title: Home
    path: home
    type: panel
    cards:
      - type: vertical-stack
        card_mod:
          style: |
            :host {
              height: 100vh !important;
              overflow: hidden !important;
            }
            #root {
              height: 100% !important;
              overflow: hidden !important;
            }
        cards:
          # ── Control strip ───────────────────────────────────────
          - type: custom:mushroom-chips-card
            chips:
              - type: weather
                entity: weather.forecast_home
                show_temperature: true
                show_conditions: true
              - type: entity
                entity: climate.upper_level
                icon: mdi:thermostat
                tap_action:
                  action: more-info
              - type: entity
                entity: vacuum.sweeping_robot
                icon: mdi:robot-vacuum
                name: Roesy
                tap_action:
                  action: more-info
              - type: entity
                entity: light.ceiling_light_rgbcw_8f2721
                icon: mdi:vanity-light
                name: Sink
                tap_action:
                  action: toggle
              - type: entity
                entity: switch.smart_plug_3
                icon: mdi:pine-tree
                name: Tree
                tap_action:
                  action: toggle
              - type: entity
                entity: switch.smart_plug
                icon: mdi:fountain
                name: Fountain
                tap_action:
                  action: toggle
              - type: entity
                entity: switch.smart_plug_2
                icon: mdi:fishbowl
                name: Pond
                tap_action:
                  action: toggle
            card_mod:
              style: |
                ha-card {
                  padding: 10px 16px !important;
                  --chip-spacing: 8px;
                  --chip-font-size: 16px;
                  --chip-icon-size: 24px;
                  --chip-height: 44px;
                  --chip-border-radius: 18px;
                }

          # ── Main content: camera + info column ──────────────────
          - type: grid
            columns: 2
            square: false
            card_mod:
              style: |
                :host {
                  height: calc(100vh - 64px) !important;
                  overflow: hidden !important;
                }
                div {
                  height: 100% !important;
                  overflow: hidden !important;
                  grid-template-columns: 2fr 1fr !important;
                  grid-template-rows: 1fr !important;
                  align-items: stretch !important;
                }
                div > * {
                  min-height: 0 !important;
                  max-height: 100% !important;
                  overflow: hidden !important;
                }
            cards:
              # ── Left (2/3): cycling cameras via input_select ────
              - type: vertical-stack
                card_mod:
                  style: |
                    :host {
                      height: calc(100vh - 74px);
                      overflow: hidden;
                    }
                cards:
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.frontporch"
                    card:
                      type: picture-entity
                      entity: camera.frontporch
                      name: Front Porch
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: &cam-style |
                          ha-card {
                            height: calc(100vh - 74px) !important;
                            overflow: hidden !important;
                          }
                          img {
                            width: 100% !important;
                            height: 100% !important;
                            object-fit: contain !important;
                          }
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.driveway"
                    card:
                      type: picture-entity
                      entity: camera.driveway
                      name: Driveway
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.backyard"
                    card:
                      type: picture-entity
                      entity: camera.backyard
                      name: Back Yard
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.critter"
                    card:
                      type: picture-entity
                      entity: camera.critter
                      name: Critter
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.armory"
                    card:
                      type: picture-entity
                      entity: camera.armory
                      name: Armory
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.pancam"
                    card:
                      type: picture-entity
                      entity: camera.pancam
                      name: Pan Cam
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style
                  - type: conditional
                    conditions:
                      - entity: input_select.camera_selector
                        state: "camera.gatetown"
                    card:
                      type: picture-entity
                      entity: camera.gatetown
                      name: Gatetown
                      camera_view: auto
                      show_state: false
                      card_mod:
                        style: *cam-style

              # ── Right (1/3): info column ────────────────────────
              - type: vertical-stack
                card_mod:
                  style: |
                    :host {
                      height: calc(100vh - 64px) !important;
                      max-height: calc(100vh - 64px) !important;
                      overflow: hidden !important;
                      display: block !important;
                    }
                    #root {
                      height: 100% !important;
                      max-height: 100% !important;
                      overflow: hidden !important;
                      display: flex !important;
                      flex-direction: column !important;
                    }
                cards:
                  # ── Date & time ─────────────────────────────────
                  - type: markdown
                    content: |
                      <div style="text-align:center">
                        <div style="font-size:42px; font-weight:300; line-height:1.1">
                          {{ now().strftime('%-I:%M %p') }}
                        </div>
                        <div style="font-size:16px; opacity:0.7; margin-top:4px">
                          {{ now().strftime('%A, %B %-d') }}
                        </div>
                      </div>
                    card_mod:
                      style: |
                        :host {
                          max-height: 80px !important;
                          overflow: hidden !important;
                          flex-shrink: 0 !important;
                        }
                        ha-card {
                          background: transparent !important;
                          box-shadow: none !important;
                          border: none !important;
                          padding: 8px 0 !important;
                        }

                  # ── 3-day weather forecast ────────────────────
                  - type: weather-forecast
                    entity: weather.forecast_home
                    forecast_type: daily
                    show_current: false
                    show_forecast: true
                    card_mod:
                      style: |
                        :host {
                          max-height: 110px !important;
                          overflow: hidden !important;
                          flex-shrink: 0 !important;
                        }
                        ha-card {
                          background: transparent !important;
                          box-shadow: none !important;
                          border: none !important;
                          padding: 0 8px !important;
                          font-size: 13px;
                          max-height: 110px !important;
                          overflow: hidden !important;
                        }

                  # ── Who's home (add person entities when ready) ─
                  # Uncomment and add your person.* entities:
                  # - type: custom:mushroom-chips-card
                  #   chips:
                  #     - type: entity
                  #       entity: person.mike
                  #       icon: mdi:account
                  #     - type: entity
                  #       entity: person.partner
                  #       icon: mdi:account

                  # ── Calendar ─────────────────────────────────────
                  - type: calendar
                    initial_view: listWeek
                    entities:
                      - calendar.home
                      - calendar.mikecirioli_gmail_com
                      - calendar.birthdays
                      - calendar.wcpss_24_25_trad_calendar
                      - calendar.mcirioli_cloudbees_com
                      - calendar.jenkins
                    card_mod:
                      style:
                        "ha-full-calendar$": |
                          ha-fab,
                          mwc-fab,
                          ha-button-menu,
                          [class*="addEvent"],
                          .fc-addEvent-button,
                          .fab {
                            display: none !important;
                          }
                        .: |
                          :host {
                            max-height: 200px !important;
                            overflow: hidden !important;
                            flex: 1 1 auto !important;
                            min-height: 0 !important;
                          }
                          ha-card {
                            max-height: 200px !important;
                            overflow: hidden !important;
                            font-size: 13px;
                            position: relative !important;
                            clip-path: inset(0 0 0 0) !important;
                          }

                  # ── Package tracking (add when ready) ───────────
                  # Uncomment when you have a package tracking entity:
                  # - type: entities
                  #   entities:
                  #     - sensor.packages_in_transit
                  #     - sensor.packages_delivered

                  # ── Recent snapshots (4 key cameras) ────────────
                  - type: grid
                    columns: 2
                    square: false
                    card_mod:
                      style: |
                        :host {
                          max-height: 270px !important;
                          overflow: hidden !important;
                          flex-shrink: 1 !important;
                          min-height: 0 !important;
                        }
                        div {
                          gap: 4px !important;
                        }
                    cards:
                      - type: picture-entity
                        entity: camera.frontporch
                        name: Porch
                        camera_view: auto
                        show_state: false
                        card_mod:
                          style: &snap-style |
                            ha-card {
                              height: 130px !important;
                              overflow: hidden !important;
                            }
                            img {
                              width: 100% !important;
                              height: 100% !important;
                              object-fit: cover !important;
                            }
                            .footer {
                              font-size: 10px !important;
                              padding: 2px 4px !important;
                            }
                      - type: picture-entity
                        entity: camera.driveway
                        name: Drive
                        camera_view: auto
                        show_state: false
                        card_mod:
                          style: *snap-style
                      - type: picture-entity
                        entity: camera.critter
                        name: Critter
                        camera_view: auto
                        show_state: false
                        card_mod:
                          style: *snap-style
                      - type: picture-entity
                        entity: camera.gatetown
                        name: Gate
                        camera_view: auto
                        show_state: false
                        card_mod:
                          style: *snap-style

  # ── View 2: Photo Frame ────────────────────────────────────────
  # Full-screen iframe to a self-contained slideshow page.
  # Completely isolated from the HA frontend — no camera streams,
  # no cards, no websocket chatter beyond the iframe.
  - title: Photos
    path: photos
    type: panel
    cards:
      - type: iframe
        url: /local/photoframe.html
        aspect_ratio: "16:10"
        card_mod:
          style: |
            ha-card {
              height: 100vh !important;
              border: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
              padding: 0 !important;
              margin: 0 !important;
              overflow: hidden !important;
            }
