<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crestron Screensaver</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #e1e1e1;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .ss-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    -webkit-transition: opacity 1.5s ease-in-out;
    transition: opacity 1.5s ease-in-out;
  }
  .ss-layer.visible { opacity: 1; }

  .ss-overlay {
    position: fixed;
    top: 0; left: 0;
    background: rgba(0, 0, 0, 0.35);
    color: #fff;
    padding: 16px 24px;
    border-radius: 14px;
    z-index: 110;
    text-align: right;
    will-change: transform;
  }
  .ss-clock {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .ss-date {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 2px;
  }
  .ss-chips {
    margin-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 8px;
  }
  .ss-chip {
    font-size: 21px;
    font-weight: 400;
    color: #ffb74d;
    line-height: 1.5;
  }
</style>
</head>
<body>

  <img id="ss-photo-a" class="ss-layer" alt="">
  <img id="ss-photo-b" class="ss-layer" alt="">
  <div class="ss-overlay" id="ss-overlay">
    <div class="ss-clock" id="ss-clock"></div>
    <div class="ss-date" id="ss-date"></div>
    <div class="ss-chips" id="ss-chips">
      <div class="ss-chip" id="chip-weather"></div>
      <div class="ss-chip" id="chip-event"></div>
      <div class="ss-chip" id="chip-thermostat"></div>
    </div>
  </div>

<script>
(function() {
  'use strict';

  // Configuration via URL hash: #server=http://host:8099&fit=cover&interval=30
  var hash = {};
  location.hash.replace(/[#&]([^=]+)=([^&]*)/g, function(_, k, v) { hash[k] = decodeURIComponent(v); });
  var PHOTOFRAME_URL = hash.server || 'http://192.168.1.245:8099';
  var PHOTO_MS       = (parseInt(hash.interval) || 30) * 1000;
  var PHOTO_FIT      = hash.fit || 'contain';  // 'contain' (fit, black bars) or 'cover' (fill, crop)

  // 1x1 transparent GIF — forces Chromium 95 to free decoded bitmap
  var BLANK = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';

  var ssPhotoA  = document.getElementById('ss-photo-a');
  var ssPhotoB  = document.getElementById('ss-photo-b');
  var ssOverlay = document.getElementById('ss-overlay');
  var elClock   = document.getElementById('ss-clock');
  var elDate    = document.getElementById('ss-date');
  var ssFront   = 'a';
  var loadTimer = null;

  // Apply photo fit mode
  ssPhotoA.style.objectFit = PHOTO_FIT;
  ssPhotoB.style.objectFit = PHOTO_FIT;

  // ── Photo slideshow ──────────────────────────────────────
  // Single-chain scheduling: only one load in flight at a time.
  // No setInterval — each cycle schedules the next via setTimeout
  // after completing (success, error, or timeout).

  var cleanupTimer = null;

  function showNextPhoto() {
    clearTimeout(loadTimer);
    clearTimeout(cleanupTimer);

    var back  = (ssFront === 'a') ? ssPhotoB : ssPhotoA;
    var front = (ssFront === 'a') ? ssPhotoA : ssPhotoB;
    // Capture references before ssFront swap for safe cleanup
    var oldFront = front;

    back.onload = function() {
      clearTimeout(loadTimer);
      back.onload = null;
      back.onerror = null;
      back.classList.add('visible');
      cleanupTimer = setTimeout(function() {
        oldFront.classList.remove('visible');
        oldFront.onload = null;
        oldFront.onerror = null;
        oldFront.src = BLANK;
      }, 1600);
      ssFront = (ssFront === 'a') ? 'b' : 'a';
      loadTimer = setTimeout(showNextPhoto, PHOTO_MS);
    };

    back.onerror = function() {
      clearTimeout(loadTimer);
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      loadTimer = setTimeout(showNextPhoto, 5000);
    };

    // Timeout guard: if image doesn't load in 8s, skip it
    loadTimer = setTimeout(function() {
      back.onload = null;
      back.onerror = null;
      back.src = BLANK;
      loadTimer = setTimeout(showNextPhoto, 5000);
    }, 8000);

    back.src = PHOTOFRAME_URL + '/random?w=1280&h=800&t=' + Date.now();
  }

  // ── Clock overlay ────────────────────────────────────────

  function renderClock() {
    var now = new Date();
    elClock.textContent =
      now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    elDate.textContent =
      now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    setTimeout(renderClock, 30000);
  }

  // ── Data chips (plain text from photoframe-server) ──────
  // Self-scheduling setTimeout chain — no setInterval.
  // Abort in-flight XHRs before starting new ones to prevent overlap.

  var DATA_MS = 120000;  // refresh every 2 min
  var activeXHRs = [];

  var chips = [
    { id: 'chip-weather',    path: '/ha/weather' },
    { id: 'chip-event',      path: '/ha/event' },
    { id: 'chip-thermostat', path: '/ha/thermostat' }
  ];

  // Cache chip DOM elements once
  var chipEls = {};
  for (var c = 0; c < chips.length; c++) {
    chipEls[chips[c].id] = document.getElementById(chips[c].id);
  }

  function fetchChip(chip) {
    var xhr = new XMLHttpRequest();
    activeXHRs.push(xhr);
    xhr.open('GET', PHOTOFRAME_URL + chip.path + '?t=' + Date.now());
    xhr.timeout = 8000;
    xhr.onload = xhr.onerror = xhr.ontimeout = function() {
      if (xhr.status === 200 && xhr.responseText != null) {
        var el = chipEls[chip.id];
        el.textContent = xhr.responseText;
        el.style.display = xhr.responseText ? '' : 'none';
      }
      // Null all handlers to help GC
      xhr.onload = null;
      xhr.onerror = null;
      xhr.ontimeout = null;
    };
    xhr.send();
  }

  function fetchAllChips() {
    // Abort any still-pending XHRs from previous cycle
    for (var a = 0; a < activeXHRs.length; a++) {
      try { activeXHRs[a].abort(); } catch(e) {}
    }
    activeXHRs = [];
    for (var i = 0; i < chips.length; i++) fetchChip(chips[i]);
    setTimeout(fetchAllChips, DATA_MS);
  }

  // ── Anti-burn-in bounce ────────────────────────────────
  // Uses transform instead of left/top to avoid layout reflow.
  // Caches overlay dimensions, re-measured only when chips update.

  var bx = 40, by = 40, dx = 1, dy = 0.7;
  var cachedOW = 200, cachedOH = 80;

  function measureOverlay() {
    cachedOW = ssOverlay.offsetWidth || 200;
    cachedOH = ssOverlay.offsetHeight || 80;
    setTimeout(measureOverlay, 10000);
  }

  function bounce() {
    var maxX = window.innerWidth - cachedOW - 20;
    var maxY = window.innerHeight - cachedOH - 20;
    bx += dx; by += dy;
    if (bx <= 20 || bx >= maxX) dx = -dx;
    if (by <= 20 || by >= maxY) dy = -dy;
    bx = Math.max(20, Math.min(bx, maxX));
    by = Math.max(20, Math.min(by, maxY));
    ssOverlay.style.cssText = '-webkit-transform:translate(' + bx + 'px,' + by + 'px);transform:translate(' + bx + 'px,' + by + 'px)';
    setTimeout(bounce, 1000);
  }

  // ── Start ────────────────────────────────────────────────
  // All recurring work uses self-scheduling setTimeout — zero setInterval.

  measureOverlay();
  renderClock();
  fetchAllChips();
  showNextPhoto();
  bounce();

})();
</script>
</body>
</html>
