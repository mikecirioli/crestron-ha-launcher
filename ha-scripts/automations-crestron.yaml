# ═══════════════════════════════════════════════════════════════════
# Crestron Panel Automations
# ═══════════════════════════════════════════════════════════════════
# Add these to your automations.yaml or create via the HA UI.
# ═══════════════════════════════════════════════════════════════════

# ── 1. Boot trigger: CH5 app fires webhook → open browser ────────
# Both panels use the same CH5 app with the same webhook ID.
# This automation opens browsers on both panels — BROWSEROPEN on an
# already-running panel just refreshes, so it's harmless.
- alias: "Crestron: Open browser on boot"
  description: >-
    When either panel boots, the CH5 app fires this webhook.
    Opens browser on both panels.
  triggers:
    - trigger: webhook
      webhook_id: crestron-open-browser
  actions:
    - action: shell_command.crestron_close_browser
    - action: shell_command.crestron2_close_browser
    - delay:
        seconds: 3
    - action: shell_command.crestron_open_browser
    - action: shell_command.crestron2_open_browser

# ── 2. Periodic browser restart (memory cleanup) ─────────────────
# Every 6 hours, fully restart both panel browsers. BROWSERCLOSE kills
# the generalweb process entirely (confirmed via TASKSTAT), reclaiming
# all leaked WebView memory. BROWSEROPEN spawns a fresh process.
- alias: "Crestron Panels: Periodic browser restart"
  description: >-
    Restarts both panel browsers every 6 hours to prevent
    memory buildup from long-running camera streams and JS.
  triggers:
    - trigger: time_pattern
      hours: "/6"
  actions:
    - action: shell_command.crestron_close_browser
    - action: shell_command.crestron2_close_browser
    - delay:
        seconds: 5
    - action: shell_command.crestron_open_browser
    - action: shell_command.crestron2_open_browser

# ── 3. Cycle cameras on the Crestron dashboard ──────────────────
# Advances the camera selector every 15 seconds so the dashboard
# shows a rotating view of all cameras.
- alias: "Crestron: Cycle cameras"
  description: >-
    Cycles through security cameras every 15 seconds on the
    Crestron panel dashboard.
  triggers:
    - trigger: time_pattern
      seconds: "/15"
  actions:
    - action: input_select.select_next
      target:
        entity_id: input_select.camera_selector
      data:
        cycle: true

# ── 4. Rebuild photo frame image list ────────────────────────────
# Regenerates the JSON image list on HA startup and every hour,
# so new photos added to /media/ciriolisaver/ appear automatically.
- alias: "Crestron: Rebuild photo frame image list"
  description: >-
    Scans the media/ciriolisaver folder and generates the JSON
    image list used by the photo frame slideshow.
  triggers:
    - trigger: homeassistant
      event: startup
    - trigger: time_pattern
      hours: "/1"
  actions:
    - action: shell_command.photoframe_build_list

