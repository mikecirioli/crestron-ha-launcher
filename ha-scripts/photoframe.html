<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Photo Frame</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* ── Photo layers (crossfade between two) ─────────────────── */
  .photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    z-index: 1;
  }
  .photo.active {
    opacity: 1;
    z-index: 2;
  }

  /* ── Info overlay (clock + weather + forecast) ─────────────── */
  .overlay {
    position: fixed;
    bottom: 40px;
    right: 40px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    padding: 16px 24px;
    border-radius: 14px;
    z-index: 10;
    text-align: right;
    /* Anti-burn-in drift */
    animation: drift 180s infinite linear alternate;
  }

  .overlay .clock {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  .overlay .date {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 2px;
  }

  .overlay .weather {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.9;
    margin-top: 6px;
  }

  .overlay .forecast {
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 8px;
    display: flex;
    gap: 16px;
    justify-content: flex-end;
  }

  .overlay .forecast-day {
    text-align: center;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.4;
  }

  .overlay .forecast-day .day-name {
    font-weight: 600;
    font-size: 13px;
    opacity: 1;
  }

  .overlay .forecast-day .day-temps {
    font-size: 13px;
  }

  .overlay .forecast-day .day-hi {
    font-weight: 500;
  }

  .overlay .forecast-day .day-lo {
    opacity: 0.6;
  }

  .overlay .forecast-day .day-cond {
    font-size: 11px;
    opacity: 0.7;
  }

  /* ── Anti-burn-in: slow drift across the screen ───────────── */
  @keyframes drift {
    0%   { transform: translate(0px, 0px); }
    25%  { transform: translate(-55vw, -35vh); }
    50%  { transform: translate(-15vw, -65vh); }
    75%  { transform: translate(-70vw, -15vh); }
    100% { transform: translate(-35vw, -50vh); }
  }

  /* ── Fallback message when no images ──────────────────────── */
  .fallback {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-size: 18px;
    text-align: center;
    z-index: 5;
  }
</style>
</head>
<body>
  <img class="photo active" id="photo-a" alt="">
  <img class="photo" id="photo-b" alt="">

  <div class="overlay">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="weather" id="weather"></div>
    <div class="forecast" id="forecast"></div>
  </div>

  <div class="fallback" id="fallback" style="display:none">
    No photos found.<br>
    Run photoframe_build_list.py to generate the image list.
  </div>

  <script>
  (function() {
    'use strict';

    // ── Configuration ────────────────────────────────────────
    var IMAGE_LIST_URL = '/local/photoframe-images.json';
    var WEATHER_ENTITY = 'weather.forecast_home';
    var DISPLAY_TIME   = 15000;  // 15 seconds per photo
    var LIST_REFRESH   = 3600000; // re-fetch image list every hour
    var FORECAST_DAYS  = 3;

    // ── State ────────────────────────────────────────────────
    var images = [];
    var currentIndex = -1;
    var activeSlot = 'a';
    var photoA = document.getElementById('photo-a');
    var photoB = document.getElementById('photo-b');
    var fallback = document.getElementById('fallback');

    // ── Image list loading ───────────────────────────────────
    function loadImageList() {
      fetch(IMAGE_LIST_URL + '?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(list) {
          if (list && list.length > 0) {
            images = list;
            fallback.style.display = 'none';
            if (currentIndex === -1) {
              // First load — start the slideshow
              shuffle(images);
              showNext();
              setInterval(showNext, DISPLAY_TIME);
            }
          } else {
            fallback.style.display = 'block';
          }
        })
        .catch(function(e) {
          console.error('Photo frame: failed to load image list', e);
          if (images.length === 0) {
            fallback.style.display = 'block';
          }
        });
    }

    // Load now, then refresh periodically (picks up new photos)
    loadImageList();
    setInterval(loadImageList, LIST_REFRESH);

    // ── Slideshow ────────────────────────────────────────────
    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }
    }

    var loadTimer = null;

    function showNext() {
      if (images.length === 0) return;

      currentIndex = (currentIndex + 1) % images.length;
      // Reshuffle when we've shown all images
      if (currentIndex === 0 && images.length > 1) shuffle(images);

      var incoming = activeSlot === 'a' ? photoB : photoA;
      var outgoing = activeSlot === 'a' ? photoA : photoB;

      // Clear previous state to force a fresh load
      clearTimeout(loadTimer);
      incoming.onload = null;
      incoming.onerror = null;
      incoming.src = '';

      // Preload the image before transitioning
      incoming.onload = function() {
        clearTimeout(loadTimer);
        incoming.classList.add('active');
        outgoing.classList.remove('active');
        activeSlot = activeSlot === 'a' ? 'b' : 'a';
      };
      incoming.onerror = function() {
        clearTimeout(loadTimer);
        // Skip broken images
        if (images.length > 1) showNext();
      };

      // Timeout: if image doesn't load in 8s, skip it
      loadTimer = setTimeout(function() {
        incoming.onload = null;
        incoming.onerror = null;
        incoming.src = '';
        if (images.length > 1) showNext();
      }, 8000);

      incoming.src = images[currentIndex];
    }

    // ── Clock + Date ─────────────────────────────────────────
    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      document.getElementById('date').textContent =
        now.toLocaleDateString([], {
          weekday: 'long', month: 'long', day: 'numeric'
        });
    }
    updateClock();
    setInterval(updateClock, 30000);

    // ── Helpers ──────────────────────────────────────────────
    function getHass() {
      try {
        var ha = window.parent.document.querySelector('home-assistant');
        return (ha && ha.hass) ? ha.hass : null;
      } catch (e) {
        return null;
      }
    }

    function formatCondition(state) {
      return state
        .replace(/-/g, ' ')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function shortDay(dateStr) {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString([], { weekday: 'short' });
    }

    // ── Current weather (reads from parent HA frontend) ──────
    function updateWeather() {
      var hass = getHass();
      if (!hass) return;

      var entity = hass.states[WEATHER_ENTITY];
      if (!entity) return;

      var temp = Math.round(entity.attributes.temperature);
      var unit = entity.attributes.temperature_unit || '\u00B0F';
      var condition = formatCondition(entity.state);

      document.getElementById('weather').textContent =
        temp + unit + '  \u00B7  ' + condition;
    }
    updateWeather();
    setInterval(updateWeather, 300000); // every 5 minutes

    // ── 3-day forecast (via HA websocket subscription) ───────
    function updateForecast() {
      var hass = getHass();
      if (!hass || !hass.connection) return;

      try {
        hass.connection.subscribeMessage(
          function(msg) {
            if (!msg || !msg.forecast) return;
            renderForecast(msg.forecast);
          },
          {
            type: 'weather/subscribe_forecast',
            forecast_type: 'daily',
            entity_id: WEATHER_ENTITY
          }
        );
      } catch (e) {
        // Fallback: try reading forecast attribute (older HA)
        try {
          var entity = hass.states[WEATHER_ENTITY];
          if (entity && entity.attributes.forecast) {
            renderForecast(entity.attributes.forecast);
          }
        } catch (e2) {
          // silently skip
        }
      }
    }

    function renderForecast(forecast) {
      var el = document.getElementById('forecast');
      // Skip today (index 0), show next FORECAST_DAYS
      var days = forecast.slice(1, FORECAST_DAYS + 1);
      if (days.length === 0) return;

      var html = '';
      for (var i = 0; i < days.length; i++) {
        var day = days[i];
        var hi = Math.round(day.temperature);
        var lo = day.templow != null ? Math.round(day.templow) : '';
        var cond = formatCondition(day.condition);
        var name = shortDay(day.datetime.split('T')[0]);

        html += '<div class="forecast-day">';
        html += '<div class="day-name">' + name + '</div>';
        html += '<div class="day-temps">';
        html += '<span class="day-hi">' + hi + '\u00B0</span>';
        if (lo !== '') html += ' <span class="day-lo">' + lo + '\u00B0</span>';
        html += '</div>';
        html += '<div class="day-cond">' + cond + '</div>';
        html += '</div>';
      }
      el.innerHTML = html;
    }

    // Wait a moment for parent HA to be ready, then subscribe
    setTimeout(updateForecast, 3000);

  })();
  </script>
</body>
</html>
